<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Torrent Stream · Uncensored</title>
  <style>
    /* --- all previous styles remain identical --- */
    * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; }
    body { background:#0b0b0f; color:#f0f0f5; min-height:100vh; display:flex; flex-direction:column; }
    .header { background:rgba(15,15,20,0.95); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); padding:14px 18px; border-bottom:1px solid rgba(255,255,255,0.06); position:sticky; top:0; z-index:50; }
    .logo { font-size:22px; font-weight:800; letter-spacing:1px; background:linear-gradient(135deg,#ff4d4d,#ffb347); -webkit-background-clip:text; background-clip:text; color:transparent; margin-bottom:12px; }
    .search-wrapper { display:flex; gap:8px; }
    .search-wrapper input { flex:1; background:#1c1c24; border:1px solid #2a2a35; border-radius:40px; padding:14px 20px; font-size:16px; color:#fff; outline:none; transition:border 0.2s; }
    .search-wrapper input:focus { border-color:#e50914; }
    .search-wrapper input::placeholder { color:#7a7a8c; }
    .search-wrapper button { background:#e50914; border:none; border-radius:40px; padding:0 24px; font-weight:600; color:white; font-size:16px; cursor:pointer; transition:background 0.2s; white-space:nowrap; }
    .search-wrapper button:hover { background:#b2070f; }
    .search-wrapper button:disabled { opacity:0.5; pointer-events:none; }
    .container { flex:1; padding:16px 12px; display:flex; flex-direction:column; gap:18px; }
    .player-section { background:#000; border-radius:18px; overflow:hidden; box-shadow:0 10px 25px rgba(0,0,0,0.5); border:1px solid #2a2a35; }
    .video-container { position:relative; width:100%; background:#0a0a0e; }
    video { width:100%; height:auto; display:block; max-height:70vh; object-fit:contain; }
    .player-placeholder { aspect-ratio:16/9; display:flex; align-items:center; justify-content:center; background:#111116; color:#888; font-size:15px; padding:20px; text-align:center; }
    .now-playing { padding:12px 16px; background:#121218; border-top:1px solid #2a2a35; font-size:14px; font-weight:500; display:flex; align-items:center; gap:8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .now-playing .label { color:#e50914; font-weight:700; }
    .results-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; }
    .results-header h2 { font-size:18px; font-weight:600; color:#ddd; }
    .results-count { color:#9a9aae; font-size:14px; }
    .torrent-list { display:flex; flex-direction:column; gap:10px; }
    .torrent-item { background:#15151c; border-radius:16px; padding:16px; border:1px solid #2a2a35; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; gap:14px; }
    .torrent-item:hover { background:#1e1e28; border-color:#e50914; transform:scale(1.01); }
    .torrent-item:active { transform:scale(0.99); }
    .torrent-icon { font-size:28px; }
    .torrent-info { flex:1; min-width:0; }
    .torrent-name { font-weight:600; font-size:15px; margin-bottom:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .torrent-meta { display:flex; gap:16px; font-size:13px; color:#a0a0b5; }
    .seeders { color:#2ecc71; font-weight:700; }
    .size { color:#b0b0c0; }
    .quality-badge { background:#2a2a35; padding:4px 10px; border-radius:20px; font-size:12px; font-weight:700; color:#ddd; text-transform:uppercase; }
    .status-message { text-align:center; padding:32px 16px; color:#8a8a9e; font-size:15px; }
    .loading-indicator { display:flex; justify-content:center; padding:20px; }
    .spinner { width:30px; height:30px; border:3px solid rgba(229,9,20,0.2); border-top-color:#e50914; border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .footer { padding:20px 16px; text-align:center; color:#6a6a7e; font-size:13px; border-top:1px solid #1f1f28; }
    .retry-note { margin-top:10px; font-size:12px; color:#999; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
</head>
<body>

<div class="header">
  <div class="logo">🏴‍☠️ StreamVault</div>
  <div class="search-wrapper">
    <input type="text" id="searchInput" placeholder="Search movies, shows, anything..." autocomplete="off" enterkeyhint="search">
    <button id="searchBtn">Search</button>
  </div>
</div>

<div class="container">
  <div class="player-section">
    <div class="video-container">
      <video id="videoPlayer" controls autoplay playsinline></video>
      <div id="playerPlaceholder" class="player-placeholder">
        <span>🔍 Search for a torrent to start streaming</span>
      </div>
    </div>
    <div class="now-playing">
      <span class="label">▶ NOW PLAYING</span>
      <span id="playingTitle">—</span>
    </div>
  </div>

  <div class="results-header">
    <h2>📡 Torrent results</h2>
    <span class="results-count" id="resultCount">0 found</span>
  </div>
  <div id="torrentList" class="torrent-list">
    <div class="status-message">Enter a search term above</div>
  </div>
  <div id="loadingIndicator" class="loading-indicator" style="display: none;">
    <div class="spinner"></div>
  </div>
</div>

<div class="footer">
  Uncensored · Stream directly from torrents · Use responsibly
</div>

<script>
  (function(){
    "use strict";

    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const torrentList = document.getElementById('torrentList');
    const resultCount = document.getElementById('resultCount');
    const loadingIndicator = document.getElementById('loadingIndicator');
    const videoPlayer = document.getElementById('videoPlayer');
    const playerPlaceholder = document.getElementById('playerPlaceholder');
    const playingTitle = document.getElementById('playingTitle');

    const client = new WebTorrent();
    let currentTorrent = null;
    let isSearching = false;

    function formatBytes(bytes) {
      if (!bytes) return '?';
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function detectQuality(name) {
      const n = name.toLowerCase();
      if (n.includes('4k') || n.includes('2160p')) return '4K';
      if (n.includes('1080p')) return '1080p';
      if (n.includes('720p')) return '720p';
      if (n.includes('480p')) return '480p';
      return 'SD';
    }

    // ----- JSONP search (CORS-free) -----
    function searchApibayJSONP(query) {
      return new Promise((resolve, reject) => {
        const callbackName = 'apibay_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
        const script = document.createElement('script');
        const url = `https://apibay.org/q.php?q=${encodeURIComponent(query)}&callback=${callbackName}`;

        window[callbackName] = (data) => {
          delete window[callbackName];
          document.body.removeChild(script);
          
          if (!Array.isArray(data) || data.length === 0 || data[0]?.name === 'No results') {
            resolve([]);
            return;
          }
          
          const torrents = data
            .filter(item => item.name && item.info_hash)
            .map(item => ({
              name: item.name,
              seeders: parseInt(item.seeders) || 0,
              size: parseInt(item.size) || 0,
              magnet: `magnet:?xt=urn:btih:${item.info_hash}&dn=${encodeURIComponent(item.name)}&tr=udp://tracker.opentrackr.org:1337/announce&tr=udp://open.demonii.com:1337/announce&tr=udp://tracker.torrent.eu.org:451/announce&tr=udp://tracker.coppersurfer.tk:6969/announce`,
              quality: detectQuality(item.name)
            }));
          
          resolve(torrents);
        };

        script.onerror = () => {
          delete window[callbackName];
          document.body.removeChild(script);
          reject(new Error('JSONP request failed'));
        };

        script.src = url;
        document.body.appendChild(script);

        setTimeout(() => {
          if (window[callbackName]) {
            delete window[callbackName];
            document.body.removeChild(script);
            reject(new Error('JSONP timeout'));
          }
        }, 10000);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderTorrents(torrents) {
      if (!torrents.length) {
        torrentList.innerHTML = '<div class="status-message">😕 No results. Try another search.</div>';
        resultCount.textContent = '0 found';
        return;
      }

      resultCount.textContent = `${torrents.length} found`;
      let html = '';
      torrents.slice(0, 30).forEach(t => {
        html += `
          <div class="torrent-item" data-magnet="${t.magnet}" data-name="${t.name.replace(/"/g, '&quot;')}">
            <div class="torrent-icon">🎬</div>
            <div class="torrent-info">
              <div class="torrent-name">${escapeHtml(t.name)}</div>
              <div class="torrent-meta">
                <span class="seeders">👥 ${t.seeders}</span>
                <span class="size">💾 ${formatBytes(t.size)}</span>
                <span class="quality-badge">${t.quality}</span>
              </div>
            </div>
          </div>
        `;
      });
      torrentList.innerHTML = html;

      document.querySelectorAll('.torrent-item').forEach(el => {
        el.addEventListener('click', () => {
          const magnet = el.dataset.magnet;
          const name = el.dataset.name;
          if (magnet) startStream(magnet, name);
        });
      });
    }

    function startStream(magnetUri, torrentName) {
      if (currentTorrent) {
        currentTorrent.destroy(() => {});
        currentTorrent = null;
      }
      
      videoPlayer.src = '';
      videoPlayer.style.display = 'none';
      playerPlaceholder.style.display = 'flex';
      playerPlaceholder.innerHTML = `<span>⏳ Connecting to peers... "${escapeHtml(torrentName)}"</span>`;
      playingTitle.textContent = torrentName || 'Loading...';

      currentTorrent = client.add(magnetUri, { announce: [] }, (torrent) => {
        console.log('Torrent added:', torrent.name);
        
        const files = torrent.files.filter(f => {
          const ext = f.name.split('.').pop().toLowerCase();
          return ['mp4', 'mkv', 'webm', 'mov', 'avi', 'm4v'].includes(ext);
        });
        
        if (files.length === 0) {
          playerPlaceholder.innerHTML = '<span>⚠️ No playable video file found in this torrent</span>';
          playingTitle.textContent = torrentName + ' (no video)';
          return;
        }
        
        files.sort((a, b) => b.length - a.length);
        const videoFile = files[0];
        
        playerPlaceholder.innerHTML = `<span>🎬 Preparing stream: ${escapeHtml(videoFile.name)}</span>`;
        playingTitle.textContent = `${torrentName} — ${videoFile.name}`;
        
        videoFile.renderTo(videoPlayer, {
          autoplay: true,
          controls: true,
          maxBlobLength: 20 * 1024 * 1024
        }, (err) => {
          if (err) {
            console.error('Render error:', err);
            playerPlaceholder.style.display = 'flex';
            playerPlaceholder.innerHTML = `<span>❌ Failed to stream: ${err.message}</span>`;
            videoPlayer.style.display = 'none';
            return;
          }
          playerPlaceholder.style.display = 'none';
          videoPlayer.style.display = 'block';
        });
      });

      currentTorrent.on('error', (err) => {
        console.error('Torrent error:', err);
        playerPlaceholder.style.display = 'flex';
        playerPlaceholder.innerHTML = `<span>⚠️ Torrent error: ${err.message}</span>`;
        videoPlayer.style.display = 'none';
      });
    }

    async function performSearch() {
      const query = searchInput.value.trim();
      if (!query) {
        torrentList.innerHTML = '<div class="status-message">Enter a search term</div>';
        resultCount.textContent = '0 found';
        return;
      }

      if (isSearching) return;
      isSearching = true;
      
      searchBtn.disabled = true;
      loadingIndicator.style.display = 'flex';
      torrentList.innerHTML = '';
      resultCount.textContent = 'Searching...';

      try {
        const torrents = await searchApibayJSONP(query);
        renderTorrents(torrents);
      } catch (err) {
        console.error('Search error:', err);
        torrentList.innerHTML = `
          <div class="status-message">
            ⚠️ Search failed: ${err.message}<br>
            <div class="retry-note">Check your internet connection or try again later.</div>
          </div>
        `;
        resultCount.textContent = 'Error';
      } finally {
        loadingIndicator.style.display = 'none';
        searchBtn.disabled = false;
        isSearching = false;
      }
    }

    searchBtn.addEventListener('click', performSearch);
    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        performSearch();
      }
    });

    window.addEventListener('beforeunload', () => {
      if (currentTorrent) currentTorrent.destroy(() => {});
    });

    videoPlayer.style.display = 'none';
    playerPlaceholder.style.display = 'flex';
  })();
</script>
</body>
</html>
