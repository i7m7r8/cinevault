<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>CineVault | Premium Streaming</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="description" content="Next-gen decentralized streaming.">
    
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1/dist/city/index.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #050508; --s1: #0d0d14; --s2: #161625; --s3: #1f1f33;
            --accent: #e8173a; --accent-glow: rgba(232, 23, 58, 0.4);
            --text: #ffffff; --muted: #88889a; --border: rgba(255, 255, 255, 0.06);
            --nav-h: 74px; --safe-top: env(safe-area-inset-top);
            --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Base & Scrollbar */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; -webkit-user-select: none; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--s3); border-radius: 10px; }

        /* Typography */
        h1, h2, h3, .logo { font-family: 'Syne', sans-serif; font-weight: 800; text-transform: uppercase; letter-spacing: -0.5px; }

        /* Navigation Systems */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000; height: var(--nav-h);
            background: rgba(5, 5, 8, 0.75); backdrop-filter: blur(25px);
            display: flex; align-items: center; padding: var(--safe-top) 24px 0;
            border-bottom: 1px solid var(--border); transition: var(--transition);
        }
        nav.scrolled { background: var(--bg); height: 68px; }
        .logo { font-size: 24px; color: var(--accent); margin-right: 30px; cursor: pointer; }
        
        .nav-links { display: flex; gap: 20px; margin-right: 30px; }
        .nav-link { font-size: 13px; font-weight: 700; color: var(--muted); cursor: pointer; transition: 0.3s; }
        .nav-link.active { color: var(--accent); }

        .search-wrap { flex: 1; position: relative; max-width: 450px; }
        #sq { 
            width: 100%; background: var(--s1); border: 1px solid var(--border); 
            color: #fff; padding: 10px 18px 10px 40px; border-radius: 12px; 
            font-size: 14px; outline: none; transition: 0.3s;
        }
        #sq:focus { border-color: var(--accent); background: var(--s2); }
        .si { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); opacity: 0.4; font-size: 14px; }

        /* Sidebar / Mobile Nav */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 65px; background: rgba(13,13,20,0.95);
            backdrop-filter: blur(20px); border-top: 1px solid var(--border);
            display: none; justify-content: space-around; align-items: center; z-index: 999;
        }

        /* Hero Engine */
        #hero { 
            height: 80vh; width: 100%; position: relative; display: flex; 
            align-items: flex-end; padding: 60px; overflow: hidden;
            background-size: cover; background-position: center 20%;
        }
        #hero::before { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 10%, transparent 70%); }
        #hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to right, var(--bg) 0%, transparent 60%); }
        .hero-inner { position: relative; z-index: 10; max-width: 800px; transform: translateY(0); transition: 0.8s; }
        .h-tag { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; background: var(--accent); border-radius: 6px; font-size: 11px; font-weight: 800; margin-bottom: 20px; }
        .hero-inner h1 { font-size: clamp(40px, 8vw, 75px); line-height: 0.9; margin-bottom: 20px; }
        .hero-meta { display: flex; gap: 15px; color: var(--muted); font-size: 14px; margin-bottom: 20px; }
        .btn-group { display: flex; gap: 15px; }
        .btn { padding: 14px 28px; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s; border: none; }
        .btn-main { background: #fff; color: #000; }
        .btn-sec { background: rgba(255,255,255,0.1); color: #fff; backdrop-filter: blur(10px); }
        .btn:hover { transform: scale(1.05); }

        /* Dynamic Grid System */
        .page { display: none; padding-top: 100px; min-height: 100vh; animation: fadeIn 0.5s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .section-row { padding: 30px 40px; }
        .row-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; }

        /* Modern Card v2 */
        .card { 
            background: var(--s1); border-radius: 20px; overflow: hidden; 
            border: 1px solid var(--border); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer; position: relative;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .card-img-wrap { position: relative; aspect-ratio: 2/3; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .card:hover img { transform: scale(1.1); filter: brightness(0.7); }
        .card-overlay { 
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; 
            opacity: 0; transition: 0.3s; background: rgba(232, 23, 58, 0.2); 
        }
        .card:hover .card-overlay { opacity: 1; }
        .play-icon-circle { width: 50px; height: 50px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; color: #fff; }

        /* Global Modal System */
        #modal { 
            position: fixed; inset: 0; z-index: 2000; background: #000; 
            display: none; flex-direction: column; opacity: 0; transition: opacity 0.5s;
        }
        #modal.active { display: flex; opacity: 1; }
        .player-viewport { flex: 1; background: #000; position: relative; }
        .modal-info-scroll { background: var(--bg); padding: 40px; border-top: 1px solid var(--border); max-height: 45vh; overflow-y: auto; }

        /* Feature Tabs in Modal */
        .m-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 25px; gap: 30px; }
        .m-tab { padding-bottom: 12px; font-size: 14px; font-weight: 700; color: var(--muted); cursor: pointer; position: relative; }
        .m-tab.active { color: #fff; }
        .m-tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: var(--accent); }

        /* Responsive Breakpoints */
        @media (max-width: 900px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .section-row { padding: 20px; }
            .nav-links { display: none; }
            .bottom-nav { display: flex; }
            #hero { height: 65vh; padding: 20px; }
            .hero-inner h1 { font-size: 40px; }
        }

        /* Skeleton Animations */
        .skel { background: linear-gradient(90deg, var(--s1) 25%, var(--s2) 50%, var(--s1) 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 20px; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>

    <nav id="navbar">
        <div class="logo" onclick="app.navigate('home')">CINEVAULT</div>
        <div class="nav-links">
            <div class="nav-link active" onclick="app.navigate('home')">Home</div>
            <div class="nav-link" onclick="app.navigate('movies')">Movies</div>
            <div class="nav-link" onclick="app.navigate('tv')">TV Shows</div>
            <div class="nav-link" onclick="app.navigate('watchlist')">Watchlist</div>
        </div>
        <div class="search-wrap">
            <i class="fa-solid fa-magnifying-glass si"></i>
            <input type="text" id="sq" placeholder="Titles, actors, genres...">
        </div>
        <div style="margin-left: 20px;">
            <label style="font-size: 10px; font-weight: 800; display: flex; align-items: center; gap: 8px; cursor: pointer;">
                18+ <input type="checkbox" id="nsfw-toggle" style="accent-color: var(--accent);">
            </label>
        </div>
    </nav>

    <div id="home-page" class="page active">
        <div id="hero">
            <div class="hero-inner">
                <div class="h-tag"><i class="fa-solid fa-fire"></i> #1 TRENDING TODAY</div>
                <h1 id="h-title">Loading Epic Content...</h1>
                <div class="hero-meta" id="h-meta"></div>
                <div class="btn-group">
                    <button class="btn btn-main" id="h-play"><i class="fa-solid fa-play"></i> PLAY NOW</button>
                    <button class="btn btn-sec" id="h-list"><i class="fa-solid fa-plus"></i> WATCHLIST</button>
                </div>
            </div>
        </div>

        <div class="section-row">
            <div class="row-header"><h2>Popular Now</h2></div>
            <div class="grid" id="grid-popular"></div>
        </div>

        <div class="section-row" style="background: rgba(255,255,255,0.02);">
            <div class="row-header"><h2>Top Rated Movies</h2></div>
            <div class="grid" id="grid-top"></div>
        </div>
    </div>

    <div id="movies-page" class="page">
        <div class="section-row">
            <div class="row-header"><h2>Explore Movies</h2></div>
            <div class="grid" id="grid-movies-all"></div>
        </div>
    </div>

    <div id="tv-page" class="page">
        <div class="section-row">
            <div class="row-header"><h2>Binge-worthy TV</h2></div>
            <div class="grid" id="grid-tv-all"></div>
        </div>
    </div>

    <div id="watchlist-page" class="page">
        <div class="section-row">
            <div class="row-header"><h2>My Watchlist</h2></div>
            <div class="grid" id="grid-watchlist"></div>
        </div>
    </div>

    <div id="modal">
        <div class="m-close" onclick="ui.closeModal()"><i class="fa-solid fa-xmark"></i></div>
        <div class="player-viewport" id="player-target"></div>
        <div class="modal-info-scroll">
            <div class="m-tabs">
                <div class="m-tab active" data-tab="info">OVERVIEW</div>
                <div class="m-tab" data-tab="episodes" id="tab-episodes-btn" style="display:none;">EPISODES</div>
                <div class="m-tab" data-tab="servers">SERVERS</div>
            </div>
            
            <div id="m-content-info" class="tab-pane">
                <h2 id="m-title-h" style="font-size: 38px; margin-bottom: 10px;">Title</h2>
                <p id="m-desc" style="color: var(--muted); font-size: 16px; line-height: 1.6; max-width: 900px;"></p>
            </div>

            <div id="m-content-episodes" class="tab-pane" style="display:none;">
                <div id="tv-controls">
                    <div class="btn-group" id="season-pills" style="margin-bottom: 20px; overflow-x: auto;"></div>
                    <div id="episode-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px;"></div>
                </div>
            </div>

            <div id="m-content-servers" class="tab-pane" style="display:none;">
                <div class="grid" id="server-list" style="grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));"></div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <i class="fa-solid fa-house" onclick="app.navigate('home')"></i>
        <i class="fa-solid fa-clapperboard" onclick="app.navigate('movies')"></i>
        <i class="fa-solid fa-tv" onclick="app.navigate('tv')"></i>
        <i class="fa-solid fa-bookmark" onclick="app.navigate('watchlist')"></i>
    </nav>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        /**
         * CINEVAULT CORE v3.0 - ADVANCED STATE ENGINE
         * Integrated with Worker: https://cinevault-api.imrannn68d-de2.workers.dev
         */
        
        const API_BASE = "https://cinevault-api.imrannn68d-de2.workers.dev";
        const IMG_W500 = "https://image.tmdb.org/t/p/w500";
        const IMG_ORI = "https://image.tmdb.org/t/p/original";

        const app = {
            state: {
                isNSFW: false,
                watchlist: JSON.parse(localStorage.getItem('cv_watchlist') || '[]'),
                activeModalItem: null,
                curS: 1,
                curE: 1
            },

            async init() {
                console.log("CineVault Engine Starting...");
                this.bindEvents();
                this.loadHomeData();
                ui.renderWatchlist();
            },

            bindEvents() {
                // Search Logic
                document.getElementById('sq').addEventListener('input', Utils.debounce((e) => {
                    this.handleSearch(e.target.value);
                }, 500));

                // NSFW Toggle
                document.getElementById('nsfw-toggle').onchange = (e) => {
                    this.state.isNSFW = e.target.checked;
                    ui.toggleTheme(this.state.isNSFW);
                    if(this.state.isNSFW) this.handleSearch(""); // Trigger adult popular
                    else this.loadHomeData();
                };

                // Modal Tabs
                document.querySelectorAll('.m-tab').forEach(tab => {
                    tab.onclick = () => ui.switchModalTab(tab.dataset.tab);
                });
            },

            async loadHomeData() {
                ui.showSkeletons();
                const trending = await this.fetch('/trending/all/day');
                if(trending && trending.results) {
                    ui.renderHero(trending.results[0]);
                    ui.renderGrid(trending.results, 'grid-popular');
                }

                const top = await this.fetch('/movie/top_rated');
                if(top) ui.renderGrid(top.results, 'grid-top');
            },

            async fetch(path) {
                try {
                    const r = await fetch(`${API_BASE}${path}`);
                    return await r.json();
                } catch(e) { return null; }
            },

            async handleSearch(q) {
                if(this.state.isNSFW) {
                    const r = await fetch(`https://www.eporner.com/api/v2/video/search/?query=${q || 'popular'}&per_page=24`);
                    const d = await r.json();
                    const items = d.videos.map(v => ({
                        title: v.title, 
                        poster_path: v.default_thumb.src, 
                        isAdult: true, 
                        embed: v.embed,
                        id: v.id
                    }));
                    ui.renderGrid(items, 'grid-popular', true);
                    return;
                }
                
                if(q.length < 3) return;
                const d = await this.fetch(`/search/multi?query=${encodeURIComponent(q)}`);
                if(d) ui.renderGrid(d.results.filter(x => x.media_type !== 'person'), 'grid-popular');
            },

            navigate(pageId) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                document.getElementById(`${pageId}-page`).classList.add('active');
                window.scrollTo(0,0);
            }
        };

        const ui = {
            renderHero(item) {
                const el = document.getElementById('hero');
                el.style.backgroundImage = `url(${IMG_ORI}${item.backdrop_path})`;
                document.getElementById('h-title').textContent = item.title || item.name;
                document.getElementById('h-play').onclick = () => this.openModal(item);
            },

            renderGrid(items, targetId, isAdult = false) {
                const g = document.getElementById(targetId);
                g.innerHTML = "";
                items.forEach(it => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    const img = isAdult ? it.poster_path : `${IMG_W500}${it.poster_path}`;
                    card.innerHTML = `
                        <div class="card-img-wrap">
                            <img src="${img}" alt="poster" loading="lazy">
                            <div class="card-overlay"><div class="play-icon-circle"><i class="fa-solid fa-play"></i></div></div>
                        </div>
                        <div style="padding:15px">
                            <div style="font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${it.title || it.name}</div>
                        </div>
                    `;
                    card.onclick = () => this.openModal(it);
                    g.appendChild(card);
                });
            },

            async openModal(item) {
                app.state.activeModalItem = item;
                const m = document.getElementById('modal');
                m.style.display = 'flex';
                setTimeout(() => m.classList.add('active'), 10);
                
                document.getElementById('m-title-h').textContent = item.title || item.name;
                document.getElementById('m-desc').textContent = item.overview || "";
                
                if(item.isAdult) {
                    this.injectIframe(item.embed);
                    document.getElementById('tab-episodes-btn').style.display = 'none';
                    return;
                }

                const isTV = item.media_type === 'tv' || !item.title;
                if(isTV) {
                    document.getElementById('tab-episodes-btn').style.display = 'block';
                    this.setupTV(item.id);
                } else {
                    document.getElementById('tab-episodes-btn').style.display = 'none';
                    this.loadStreams(item.id);
                }
            },

            async setupTV(id) {
                const data = await app.fetch(`/tv/${id}`);
                const wrap = document.getElementById('season-pills');
                wrap.innerHTML = "";
                data.seasons.forEach(s => {
                    if(s.season_number === 0) return;
                    const btn = document.createElement('button');
                    btn.className = 'btn btn-sec';
                    btn.style.padding = "8px 16px";
                    btn.textContent = `Season ${s.season_number}`;
                    btn.onclick = () => this.loadEpisodes(id, s.season_number);
                    wrap.appendChild(btn);
                });
                this.loadEpisodes(id, 1);
            },

            async loadEpisodes(id, sNum) {
                app.state.curS = sNum;
                const data = await app.fetch(`/tv/${id}/season/${sNum}`);
                const g = document.getElementById('episode-grid');
                g.innerHTML = "";
                data.episodes.forEach(e => {
                    const div = document.createElement('div');
                    div.className = 'pill';
                    div.style.display = "flex";
                    div.style.justifyContent = "space-between";
                    div.innerHTML = `<span>EP ${e.episode_number}: ${e.name}</span> <i class="fa-solid fa-circle-play"></i>`;
                    div.onclick = () => {
                        app.state.curE = e.episode_number;
                        this.loadStreams(id);
                        this.switchModalTab('info');
                    }
                    g.appendChild(div);
                });
            },

            async loadStreams(id) {
                const it = app.state.activeModalItem;
                const isTV = it.media_type === 'tv' || !it.title;
                const path = isTV ? `/streams/${id}/${app.state.curS}/${app.state.curE}` : `/streams/${id}`;
                
                const streams = await app.fetch(path);
                const sList = document.getElementById('server-list');
                sList.innerHTML = "";

                streams.forEach((s, i) => {
                    const btn = document.createElement('div');
                    btn.className = 'pill';
                    btn.style.textAlign = "center";
                    btn.innerHTML = `<i class="fa-solid fa-server"></i> Server ${i+1}`;
                    btn.onclick = () => this.playStream(s.url);
                    sList.appendChild(btn);
                });
                if(streams.length > 0) this.playStream(streams[0].url);
            },

            playStream(url) {
                const target = document.getElementById('player-target');
                const finalUrl = `${API_BASE}/stream-proxy?url=${encodeURIComponent(url)}`;
                target.innerHTML = `<video id="cv-player" class="video-js vjs-theme-city" controls preload="auto" width="100%" height="100%"></video>`;
                
                const player = videojs('cv-player', { autoplay: true });
                player.src({ type: 'video/mp4', src: finalUrl });
            },

            injectIframe(url) {
                document.getElementById('player-target').innerHTML = `<iframe src="${url}" allowfullscreen style="width:100%; height:100%; border:none;"></iframe>`;
            },

            closeModal() {
                const m = document.getElementById('modal');
                m.classList.remove('active');
                setTimeout(() => m.style.display = 'none', 500);
                document.getElementById('player-target').innerHTML = "";
            },

            switchModalTab(tabId) {
                document.querySelectorAll('.m-tab').forEach(t => t.classList.remove('active'));
                document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');
                document.querySelectorAll('.tab-pane').forEach(p => p.style.display = 'none');
                document.getElementById(`m-content-${tabId}`).style.display = 'block';
            },

            showSkeletons() {
                const g = document.getElementById('grid-popular');
                g.innerHTML = Array(10).fill('<div class="skel" style="height:250px"></div>').join('');
            }
        };

        const Utils = {
            debounce(func, wait) {
                let timeout;
                return function executedFunction(...args) {
                    const later = () => {
                        clearTimeout(timeout);
                        func(...args);
                    };
                    clearTimeout(timeout);
                    timeout = setTimeout(later, wait);
                };
            }
        };

        // Boot
        app.init();
    </script>
</body>
</html>
