<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0d0d14">
    <link rel="manifest" href="manifest.json">
    <title>CineVault | Edge Streaming</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    
    <style>
        :root {
            --bg: #0d0d14; --s1: #161625; --s2: #1f1f33;
            --accent: #e8173a; --text: #f2f2f8; --muted: #7e7e9a;
            --border: rgba(255,255,255,0.08); --nav-h: 70px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; line-height: 1.5; overflow-x: hidden; }
        
        /* Navigation */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000; height: var(--nav-h);
            background: rgba(13, 13, 20, 0.85); backdrop-filter: blur(20px);
            display: flex; align-items: center; padding: 0 20px; gap: 15px;
            border-bottom: 1px solid var(--border);
        }
        .logo { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; color: var(--accent); letter-spacing: -1px; }
        #sq { flex: 1; background: var(--s1); border: 1px solid var(--border); color: #fff; padding: 12px 16px; border-radius: 12px; outline: none; transition: 0.3s; }
        #sq:focus { border-color: var(--accent); background: var(--s2); }

        /* NSFW Switch */
        .nsfw-toggle { display: flex; align-items: center; gap: 8px; font-size: 10px; font-weight: 800; }
        .switch { position: relative; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #333; border-radius: 34px; transition: 0.4s; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; transition: 0.4s; border-radius: 50%; }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* Main Content */
        #hero { height: 60vh; position: relative; display: flex; align-items: flex-end; padding: 40px; background-size: cover; background-position: center; }
        #hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(0deg, var(--bg) 5%, transparent 100%); }
        .hero-content { position: relative; z-index: 2; max-width: 600px; }
        .hero-content h1 { font-family: 'Syne', sans-serif; font-size: clamp(32px, 8vw, 54px); line-height: 1; margin-bottom: 15px; }

        .section-label { padding: 20px 20px 0; font-family: 'Syne', sans-serif; font-size: 18px; color: var(--muted); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: var(--s1); border-radius: 16px; overflow: hidden; border: 1px solid var(--border); transition: 0.3s; cursor: pointer; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card-info { padding: 12px; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Fullscreen Modal Player */
        #modal { position: fixed; inset: 0; z-index: 2000; background: #000; display: none; flex-direction: column; animation: fadeIn 0.3s ease; }
        #modal.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .player-container { flex: 1; background: #000; position: relative; }
        .modal-details { background: var(--bg); padding: 25px; max-height: 45vh; overflow-y: auto; border-top: 1px solid var(--border); }
        .close-btn { position: absolute; top: 20px; right: 20px; z-index: 2100; font-size: 30px; cursor: pointer; text-shadow: 0 0 10px #000; }
        
        .btn-group { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-top: 15px; scrollbar-width: none; }
        .btn-group::-webkit-scrollbar { display: none; }
        .pill { padding: 10px 18px; background: var(--s2); border-radius: 10px; border: 1px solid var(--border); white-space: nowrap; font-size: 12px; font-weight: 600; }
        .pill.active { background: var(--accent); border-color: var(--accent); }

        .video-js { width: 100%; height: 100%; }
    </style>
</head>
<body>

<nav>
    <div class="logo">CV</div>
    <input type="text" id="sq" placeholder="Search Movies or TV...">
    <div class="nsfw-toggle">
        <span>18+</span>
        <label class="switch">
            <input type="checkbox" id="nsfw-mode">
            <span class="slider"></span>
        </label>
    </div>
</nav>

<div id="hero">
    <div class="hero-content">
        <h1 id="hero-title">Welcome</h1>
        <button id="hero-play" style="background:var(--accent); padding:14px 28px; border-radius:12px; font-weight:700;">▶ WATCH LATEST</button>
    </div>
</div>

<h2 class="section-label" id="grid-label">Trending Now</h2>
<div class="grid" id="main-grid"></div>

<div id="modal">
    <div class="close-btn" onclick="closeModal()">✕</div>
    <div class="player-container" id="player-target">
        </div>
    <div class="modal-details">
        <h2 id="m-title" style="font-family:'Syne';">Title</h2>
        <div id="m-meta" style="color:var(--muted); font-size:14px; margin-top:5px;"></div>
        
        <div id="tv-controls" style="display:none;">
            <div class="btn-group" id="season-list"></div>
            <div class="btn-group" id="episode-list"></div>
        </div>

        <div class="btn-group" id="stream-list"></div>
    </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script>
    /** CONFIG **/
    const WORKER = "https://your-worker-name.workers.dev"; // 👈 YOUR CLOUDFLARE URL
    const TMDB_IMG = "https://image.tmdb.org/t/p/w500";
    const $ = id => document.getElementById(id);

    let vPlayer = null;
    let currentData = null;
    let curS = 1, curE = 1;

    /** API CALLS **/
    async function api(path) {
        try {
            const res = await fetch(`${WORKER}${path}`);
            return await res.json();
        } catch (e) { console.error(e); return null; }
    }

    /** UI LOGIC **/
    async function init() {
        const data = await api("/trending/all/day");
        if(data && data.results) {
            updateHero(data.results[0]);
            renderGrid(data.results);
        }
    }

    function updateHero(item) {
        $('hero').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${item.backdrop_path})`;
        $('hero-title').textContent = item.title || item.name;
        $('hero-play').onclick = () => openModal(item);
    }

    function renderGrid(items, isAdult = false) {
        const grid = $('main-grid');
        grid.innerHTML = "";
        items.forEach(it => {
            if(!it.poster_path && !it.isAdult) return;
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <img src="${isAdult ? it.poster_path : TMDB_IMG + it.poster_path}" loading="lazy">
                <div class="card-info">${it.title || it.name}</div>
            `;
            div.onclick = () => openModal(it);
            grid.appendChild(div);
        });
    }

    /** MODAL & PLAYER **/
    async function openModal(item) {
        currentData = item;
        $('modal').classList.add('active');
        $('m-title').textContent = item.title || item.name;
        $('player-target').innerHTML = `<div style="display:flex; height:100%; align-items:center; justify-content:center;">Initializing Edge Stream...</div>`;
        
        if (item.isAdult) {
            $('tv-controls').style.display = 'none';
            $('stream-list').innerHTML = `<div class="pill active">Adult FOSS Stream</div>`;
            $('player-target').innerHTML = `<iframe src="${item.embed}" allowfullscreen></iframe>`;
            return;
        }

        const isTV = item.media_type === 'tv' || !item.title;
        if(isTV) setupTV(item.id);
        else $('tv-controls').style.display = 'none';

        fetchStreams(item.id);
    }

    async function fetchStreams(id) {
        const path = currentData.media_type === 'tv' ? `/streams/${id}/${curS}/${curE}` : `/streams/${id}`;
        const streams = await api(path);
        const list = $('stream-list');
        list.innerHTML = "";

        if(!streams || streams.length === 0) {
            list.innerHTML = "No streams found for this title.";
            return;
        }

        streams.forEach((s, i) => {
            const b = document.createElement('div');
            b.className = `pill ${i===0?'active':''}`;
            b.textContent = s.title.split('\n')[0].substring(0,15);
            b.onclick = () => {
                document.querySelectorAll('#stream-list .pill').forEach(p=>p.classList.remove('active'));
                b.classList.add('active');
                playVideo(s.url);
            };
            list.appendChild(b);
        });

        playVideo(streams[0].url);
    }

    function playVideo(rawUrl) {
        const target = $('player-target');
        const proxiedUrl = `${WORKER}/stream-proxy?url=${encodeURIComponent(rawUrl)}`;
        
        target.innerHTML = `
            <video id="v-js" class="video-js vjs-big-play-centered" controls preload="auto" width="100%" height="100%">
                <source src="${proxiedUrl}" type="video/mp4">
            </video>`;
        
        if(vPlayer) vPlayer.dispose();
        vPlayer = videojs('v-js', {
            playbackRates: [0.5, 1, 1.5, 2],
            fluid: false,
            responsive: true
        });
    }

    async function setupTV(id) {
        $('tv-controls').style.display = 'block';
        const data = await api(`/tv/${id}`);
        const sList = $('season-list');
        sList.innerHTML = "";
        data.seasons.forEach(s => {
            if(s.season_number === 0) return;
            const b = document.createElement('div');
            b.className = `pill ${s.season_number === 1?'active':''}`;
            b.textContent = `Season ${s.season_number}`;
            b.onclick = () => { curS = s.season_number; setupEpisodes(id, s.season_number); };
            sList.appendChild(b);
        });
        setupEpisodes(id, 1);
    }

    async function setupEpisodes(id, sNum) {
        const data = await api(`/tv/${id}/season/${sNum}`);
        const eList = $('episode-list');
        eList.innerHTML = "";
        data.episodes.forEach(e => {
            const b = document.createElement('div');
            b.className = `pill ${e.episode_number === 1?'active':''}`;
            b.textContent = `Ep ${e.episode_number}`;
            b.onclick = () => { curE = e.episode_number; fetchStreams(id); };
            eList.appendChild(b);
        });
    }

    function closeModal() {
        $('modal').classList.remove('active');
        if(vPlayer) vPlayer.pause();
        $('player-target').innerHTML = "";
    }

    /** EVENTS **/
    $('sq').oninput = async (e) => {
        const q = e.target.value;
        if(q.length < 3) return;
        if($('nsfw-mode').checked) {
            const r = await fetch(`https://www.eporner.com/api/v2/video/search/?query=${q}&per_page=20`);
            const d = await r.json();
            renderGrid(d.videos.map(v=>({title:v.title, poster_path:v.default_thumb.src, isAdult:true, embed:v.embed})), true);
        } else {
            const d = await api(`/search/multi?query=${q}`);
            renderGrid(d.results);
        }
    };

    $('nsfw-mode').onchange = (e) => {
        $('grid-label').textContent = e.target.checked ? "🔞 Adult Content" : "Trending Now";
        if(!e.target.checked) init(); else $('main-grid').innerHTML = "<p style='padding:20px; color:var(--muted)'>Type in the search bar to find content...</p>";
    };

    init();
</script>
</body>
</html>
