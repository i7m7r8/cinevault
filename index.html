<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CineVault</title>

<style>

body{
background:#0b0f1a;
color:white;
font-family:system-ui;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
margin-bottom:10px;
}

.desc{
color:#aaa;
margin-bottom:20px;
}

.player-wrap{
position:relative;
width:100%;
aspect-ratio:16/9;
background:black;
border-radius:14px;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,.6);
}

.player-wrap iframe{
width:100%;
height:100%;
border:0;
}

.section{
margin-top:20px;
}

.buttons{
display:flex;
flex-wrap:wrap;
gap:8px;
}

button{
padding:10px 14px;
border-radius:8px;
border:none;
background:#1f2937;
color:white;
cursor:pointer;
}

button.active{
background:#e11d48;
}

button:hover{
background:#374151;
}

.now-playing{
margin-top:20px;
padding:15px;
border:2px solid #e11d48;
border-radius:12px;
background:#0f172a;
}

</style>
</head>

<body>

<div class="container">

<h1>Mr. Robot</h1>

<div class="desc">
A young programmer Elliot suffers from anti-social disorder and becomes a hacker fighting corporate power.
</div>

<div class="player-wrap">
<iframe id="player" allowfullscreen allow="autoplay"></iframe>
</div>

<div class="section">
<h3>Season</h3>

<div class="buttons">

<button onclick="setSeason(1)" class="active">S1</button>
<button onclick="setSeason(2)">S2</button>
<button onclick="setSeason(3)">S3</button>
<button onclick="setSeason(4)">S4</button>

</div>
</div>

<div class="section">
<h3>Episode</h3>

<div class="buttons" id="episodes"></div>

</div>

<div class="section">
<h3>Source</h3>

<div class="buttons">

<button onclick="setSource('2embed')" class="active">2Embed</button>
<button onclick="setSource('vidsrc')">VidSrc</button>
<button onclick="setSource('multi')">MultiEmbed</button>

</div>

</div>

<div class="now-playing" id="nowPlaying">
Not playing
</div>

</div>

<script>

const API = "https://test-repo-six-sepia.vercel.app/embed-proxy"

const TMDB_ID = 62560

let season = 1
let episode = 1
let source = "2embed"

function loadEpisodes(){

const wrap = document.getElementById("episodes")
wrap.innerHTML = ""

for(let i=1;i<=10;i++){

const btn = document.createElement("button")

btn.textContent = i

if(i===episode) btn.classList.add("active")

btn.onclick = ()=>{
episode=i
loadEpisodes()
play()
}

wrap.appendChild(btn)

}

}

function setSeason(s){

season=s
episode=1

document.querySelectorAll("h3 + .buttons button")
.forEach(b=>b.classList.remove("active"))

event.target.classList.add("active")

loadEpisodes()
play()

}

function setSource(s){

source=s

document.querySelectorAll(".section:nth-of-type(3) button")
.forEach(b=>b.classList.remove("active"))

event.target.classList.add("active")

play()

}

function buildURL(){

if(source==="2embed"){

return `https://www.2embed.cc/embed/tmdb/tv?id=${TMDB_ID}&s=${season}&e=${episode}`

}

if(source==="vidsrc"){

return `https://vidsrc.cc/v2/embed/tv/${TMDB_ID}/${season}/${episode}`

}

if(source==="multi"){

return `https://multiembed.mov/?video_id=${TMDB_ID}&tmdb=1&s=${season}&e=${episode}`

}

}

function play(){

const url = buildURL()

const proxied = API + "?url=" + encodeURIComponent(url)

document.getElementById("player").src = proxied

document.getElementById("nowPlaying").innerText =
`Now Playing: Season ${season} Episode ${episode} • ${source}`

}

loadEpisodes()

play()

</script>

</body>
</html>
