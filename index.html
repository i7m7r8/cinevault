<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CineVault | Live</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1/dist/city/index.css" rel="stylesheet">

    <style>
        :root { --bg: #050508; --accent: #e8173a; --s1: #11111a; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; margin: 0; }
        nav { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(5,5,8,0.9); backdrop-filter: blur(15px); display: flex; align-items: center; padding: 0 30px; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); gap: 20px; }
        #sq { flex: 1; background: #1a1a25; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 8px; outline: none; }
        #sq:focus { border-color: var(--accent); }
        
        .hero { height: 60vh; background-size: cover; background-position: center; display: flex; align-items: flex-end; padding: 50px; position: relative; }
        .hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(0deg, var(--bg), transparent); }
        .hero-content { position: relative; z-index: 2; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 30px; }
        .card { background: var(--s1); border-radius: 12px; overflow: hidden; cursor: pointer; border: 1px solid transparent; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card-t { padding: 10px; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #modal { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; }
        .player-area { flex: 1; position: relative; }
        .info-area { padding: 30px; background: var(--bg); border-top: 1px solid #222; overflow-y: auto; max-height: 40vh; }
        .close-m { position: absolute; top: 20px; right: 20px; z-index: 2100; cursor: pointer; font-size: 30px; }
        .server-btn { padding: 10px 20px; background: #222; border-radius: 5px; cursor: pointer; display: inline-block; margin: 5px; font-size: 13px; }
        .server-btn.active { background: var(--accent); }
    </style>
</head>
<body>

<nav>
    <div style="font-family:Syne; color:var(--accent); font-size:22px; font-weight:800;">CINEVAULT</div>
    <input type="text" id="sq" placeholder="Search movies or TV shows...">
</nav>

<div id="hero-wrap"></div>

<div class="grid" id="main-grid"></div>

<div id="modal">
    <div class="close-m" onclick="closeModal()">✕</div>
    <div class="player-area" id="player-target"></div>
    <div class="info-area">
        <h1 id="m-title"></h1>
        <div id="m-desc" style="color:#888; margin: 10px 0 20px;"></div>
        <div id="tv-controls" style="display:none; margin-bottom: 20px;">
            <div id="s-pills"></div>
            <div id="e-pills" style="margin-top: 10px;"></div>
        </div>
        <div id="server-list"></div>
    </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script>
    const WORKER = "https://cinevault-api.imrannn68d-de2.workers.dev";
    const IMG = "https://image.tmdb.org/t/p/";
    let player = null;
    let activeItem = null;

    async function api(path) {
        try {
            const r = await fetch(`${WORKER}${path}`);
            return await r.json();
        } catch(e) { console.error("Worker Error:", e); return null; }
    }

    async function loadHome() {
        const d = await api("/trending/all/day");
        if(d && d.results) {
            renderHero(d.results[0]);
            renderGrid(d.results);
        }
    }

    function renderHero(it) {
        document.getElementById('hero-wrap').innerHTML = `
            <div class="hero" style="background-image: url(${IMG}original${it.backdrop_path})">
                <div class="hero-content">
                    <h1 style="font-family:Syne; font-size:50px; margin:0;">${it.title || it.name}</h1>
                    <button onclick='openModal(${JSON.stringify(it).replace(/'/g, "&apos;")})' style="background:var(--accent); color:white; border:none; padding:15px 30px; border-radius:8px; font-weight:700; cursor:pointer; margin-top:15px;">WATCH NOW</button>
                </div>
            </div>`;
    }

    function renderGrid(items) {
        const g = document.getElementById('main-grid');
        g.innerHTML = items.map(it => `
            <div class="card" onclick='openModal(${JSON.stringify(it).replace(/'/g, "&apos;")})'>
                <img src="${IMG}w300${it.poster_path}" alt="poster">
                <div class="card-t">${it.title || it.name}</div>
            </div>
        `).join('');
    }

    async function openModal(it) {
        activeItem = it;
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('m-title').innerText = it.title || it.name;
        document.getElementById('m-desc').innerText = it.overview;
        
        const isTV = it.media_type === 'tv' || !it.title;
        if(isTV) loadTV(it.id);
        else loadStreams(it.id);
    }

    async function loadStreams(id, s = null, e = null) {
        const path = s ? `/streams/${id}/${s}/${e}` : `/streams/${id}`;
        const streams = await api(path);
        const list = document.getElementById('server-list');
        list.innerHTML = "<h4>Select Server:</h4>";
        
        if(!streams || streams.length === 0) {
            list.innerHTML += "<p>No streams found.</p>"; return;
        }

        streams.forEach((st, idx) => {
            const btn = document.createElement('div');
            btn.className = 'server-btn' + (idx === 0 ? ' active' : '');
            btn.innerText = `Server ${idx + 1}`;
            btn.onclick = () => {
                document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                play(st.url);
            };
            list.appendChild(btn);
        });
        play(streams[0].url);
    }

    function play(url) {
        // IMPORTANT: The stream-proxy handles headers so the video actually loads
        const finalUrl = `${WORKER}/stream-proxy?url=${encodeURIComponent(url)}`;
        const target = document.getElementById('player-target');
        target.innerHTML = `<video id="v-vid" class="video-js vjs-theme-city" controls autoplay preload="auto" width="100%" height="100%"></video>`;
        
        if(player) player.dispose();
        player = videojs('v-vid', { fluid: false });
        player.src({ type: 'video/mp4', src: finalUrl });
        
        player.on('error', () => {
            alert("This server is down. Try another server.");
        });
    }

    async function loadTV(id) {
        const d = await api(`/tv/${id}`);
        const ctrl = document.getElementById('tv-controls');
        const sPills = document.getElementById('s-pills');
        ctrl.style.display = 'block';
        sPills.innerHTML = "<h4>Seasons:</h4>";
        
        d.seasons.forEach(sz => {
            if(sz.season_number === 0) return;
            const p = document.createElement('div');
            p.className = 'server-btn';
            p.innerText = `S ${sz.season_number}`;
            p.onclick = () => loadEpisodes(id, sz.season_number);
            sPills.appendChild(p);
        });
        loadEpisodes(id, 1);
    }

    async function loadEpisodes(id, sNum) {
        const d = await api(`/tv/${id}/season/${sNum}`);
        const ePills = document.getElementById('e-pills');
        ePills.innerHTML = "<h4>Episodes:</h4>";
        d.episodes.forEach(ep => {
            const p = document.createElement('div');
            p.className = 'server-btn';
            p.innerText = `Ep ${ep.episode_number}`;
            p.onclick = () => loadStreams(id, sNum, ep.episode_number);
            ePills.appendChild(p);
        });
        loadStreams(id, sNum, 1);
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        if(player) player.pause();
    }

    // SEARCH FIX: Triggering search on typing
    document.getElementById('sq').oninput = async (e) => {
        const val = e.target.value;
        if(val.length < 3) return;
        const d = await api(`/search/multi?query=${encodeURIComponent(val)}`);
        if(d && d.results) renderGrid(d.results);
    };

    loadHome();
</script>
</body>
</html>
