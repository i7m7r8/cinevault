<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CineVault">
<meta name="description" content="Free movies & TV streaming">
<link rel="manifest" href="manifest.json">
<title>CineVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- WebTorrent -->
<script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
<!-- Plyr FOSS player -->
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<style>
/* Plyr overrides — make it fill the pwrap and match CineVault theme */
.pwrap .plyr {
  position:absolute;inset:0;width:100%!important;height:100%!important;
  border-radius:0;
}
.pwrap .plyr video {
  position:absolute;inset:0;width:100%!important;height:100%!important;object-fit:contain;
}
.plyr__control--overlaid {
  background: rgba(232,23,58,0.9) !important;
}
.plyr--full-ui input[type=range] {
  color: #e8173a !important;
}
.plyr__controls {
  background: linear-gradient(transparent, rgba(0,0,0,0.75)) !important;
}
.plyr__control:hover, .plyr__control[aria-expanded=true] {
  background: #e8173a !important;
}
/* Sub overlay must sit above Plyr controls (z-index 10 is Plyr controls) */
#sub-overlay {
  z-index: 30 !important;
  bottom: 72px !important; /* above Plyr control bar */
}
</style>
<style>
/* (Keep all your existing CSS – it's unchanged) */
:root {
  --bg: #0d0d14;
  --s1: #13131e;
  --s2: #1a1a28;
  --s3: #222235;
  --border: rgba(255,255,255,0.07);
  --accent: #e8173a;
  --accent-dim: rgba(232,23,58,0.15);
  --gold: #fbbf24;
  --green: #10b981;
  --text: #f2f2f8;
  --muted: #6b6b8a;
  --r: 10px;
  --nav-h: 58px;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f0f0f7;
    --s1: #ffffff;
    --s2: #f8f8ff;
    --s3: #ededfa;
    --border: rgba(0,0,0,0.08);
    --text: #0d0d14;
    --muted: #8080a0;
  }
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
img{display:block}
button{cursor:pointer;font-family:'DM Sans',sans-serif}
a{text-decoration:none;color:inherit}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}

/* NAV */
#nav {
  position:fixed;top:0;left:0;right:0;z-index:90;
  height:var(--nav-h);
  display:flex;align-items:center;gap:10px;
  padding:0 14px;
  background:rgba(13,13,20,0.9);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
@media(prefers-color-scheme:light){
  #nav{background:rgba(240,240,247,0.92)}
}
.logo{
  font-family:'Syne',sans-serif;font-size:20px;font-weight:800;
  letter-spacing:2px;color:var(--accent);
  text-shadow:0 0 24px rgba(232,23,58,0.5);
  flex-shrink:0;
}
/* SEARCH */
#search-box{
  flex:1;position:relative;max-width:340px;
}
#search-box input{
  width:100%;background:var(--s2);
  border:1px solid var(--border);color:var(--text);
  padding:8px 12px 8px 36px;border-radius:8px;
  font-size:14px;font-family:'DM Sans',sans-serif;
  outline:none;transition:border-color .2s;
  -webkit-appearance:none;
}
#search-box input:focus{border-color:var(--accent)}
#search-box input::placeholder{color:var(--muted)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
#search-clear{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--muted);font-size:16px;
  display:none;padding:2px 4px;
}
/* TABS */
#tabs{
  display:flex;gap:2px;flex-shrink:0;
  overflow-x:auto;scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
#tabs::-webkit-scrollbar{display:none}
.tab{
  padding:5px 11px;border-radius:7px;font-size:12px;font-weight:600;
  border:none;background:transparent;color:var(--muted);
  transition:all .2s;white-space:nowrap;
}
.tab.on,.tab:active{background:var(--accent);color:#fff}

/* HERO */
#hero{
  height:75vw;max-height:520px;min-height:300px;
  position:relative;display:flex;align-items:flex-end;
  padding:20px 16px;margin-top:var(--nav-h);overflow:hidden;
}
#hero-bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  transition:background-image .6s ease;
}
#hero-bg::after{
  content:'';position:absolute;inset:0;
  background:
    linear-gradient(to top,var(--bg) 0%,rgba(13,13,20,.6) 45%,transparent 100%),
    linear-gradient(to right,rgba(13,13,20,.8) 0%,transparent 60%);
}
@media(prefers-color-scheme:light){
  #hero-bg::after{
    background:
      linear-gradient(to top,var(--bg) 0%,rgba(240,240,247,.6) 45%,transparent 100%),
      linear-gradient(to right,rgba(240,240,247,.8) 0%,transparent 60%);
  }
}
.hc{position:relative;z-index:2;max-width:420px}
.hbadge{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--accent);color:#fff;
  padding:2px 9px;border-radius:4px;
  font-size:10px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;margin-bottom:8px;
}
#htitle{
  font-family:'Syne',sans-serif;font-size:clamp(22px,5vw,46px);
  font-weight:800;line-height:1.05;margin-bottom:6px;
}
#hdesc{
  font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:12px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.hmeta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);margin-bottom:12px}
.hrating{color:var(--gold);font-weight:700}
.hbtns{display:flex;gap:8px}
.btn-w{
  display:flex;align-items:center;gap:5px;
  background:var(--accent);color:#fff;
  border:none;padding:9px 18px;border-radius:8px;
  font-size:13px;font-weight:600;
  transition:all .15s;
}
.btn-w:active{transform:scale(.96)}
.btn-i{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.1);color:var(--text);
  border:1px solid var(--border);padding:9px 14px;border-radius:8px;
  font-size:13px;font-weight:500;
  backdrop-filter:blur(10px);
  transition:all .15s;
}
.btn-i:active{transform:scale(.96)}

/* SECTIONS */
.sec{padding:16px 14px 4px}
.sec-title{
  font-family:'Syne',sans-serif;font-size:16px;font-weight:800;
  letter-spacing:.5px;margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent)}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
  gap:8px;
}
@media(min-width:480px){.grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}}
@media(min-width:768px){.grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}}

/* CARD */
.card{
  border-radius:var(--r);overflow:hidden;
  cursor:pointer;background:var(--s2);
  border:1px solid var(--border);
  transition:transform .2s,box-shadow .2s;
  position:relative;
}
@media(hover:hover){
  .card:hover{transform:translateY(-3px) scale(1.02);border-color:var(--accent);box-shadow:0 6px 20px rgba(232,23,58,.2);z-index:2}
  .card:hover .cov{opacity:1}
}
.card:active{transform:scale(.97)}
.cposter{width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--s3)}
.cinfo{padding:6px 8px 8px}
.ctitle{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.cmeta{display:flex;justify-content:space-between;font-size:10px;color:var(--muted)}
.crating{color:var(--gold);font-weight:700}
.cov{
  position:absolute;inset:0;background:rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;border-radius:var(--r);
}
.pbc{width:40px;height:40px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}

/* SKELETON */
.sk{
  border-radius:var(--r);aspect-ratio:2/3;
  background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);
  background-size:200% 100%;
  animation:sh 1.4s infinite;
}
@keyframes sh{to{background-position:-200% 0}}

/* MODAL */
#modal{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.85);
  display:none;align-items:flex-start;justify-content:center;
  padding:8px 8px 40px;overflow-y:auto;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  -webkit-overflow-scrolling:touch;
}
#modal.on{display:flex}
.mbox{
  background:var(--s1);border-radius:16px;
  width:100%;max-width:820px;margin:auto;
  border:1px solid var(--border);
  overflow:visible;position:relative;
}
.mclose{
  position:absolute;top:8px;right:8px;z-index:10;
  width:32px;height:32px;border-radius:50%;
  background:rgba(0,0,0,.7);border:1px solid var(--border);
  color:#fff;font-size:15px;
  display:flex;align-items:center;justify-content:center;
}
.mclose:active{transform:scale(.9)}
.mback{width:100%;aspect-ratio:16/9;background:#000;position:relative;overflow:hidden}
.mback img{width:100%;height:100%;object-fit:cover;opacity:.45}
.mback::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,var(--s1),transparent 55%);
}
.mbody{padding:14px 16px 40px;overflow-x:hidden}
.mtitle{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:5px}
.mmeta{display:flex;flex-wrap:wrap;gap:7px;font-size:11px;color:var(--muted);margin-bottom:8px;align-items:center}
.mrating{color:var(--gold);font-weight:700}
.mdesc{font-size:12px;line-height:1.7;color:var(--muted);margin-bottom:14px}

/* CTRL */
.crow{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;align-items:center}
.clabel{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-right:2px;white-space:nowrap}
.cbtns{display:flex;gap:4px;flex-wrap:wrap}
.cbtn{
  padding:5px 11px;border-radius:6px;font-size:11px;font-weight:600;
  border:1px solid var(--border);background:var(--s2);color:var(--text);
  transition:all .15s;white-space:nowrap;
}
.cbtn:active{transform:scale(.94)}
.cbtn.on,.cbtn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.cbtn.on-g{background:var(--green);border-color:var(--green);color:#fff}

/* PLAYER WRAPPER */
.player-outer{ position:relative; width:100%; }
.pwrap{
  width:100%;aspect-ratio:16/9;border-radius:10px;
  overflow:hidden;background:#000;
  border:1px solid var(--border);position:relative;
}
.pwrap iframe, .pwrap video{
  position:absolute;inset:0;width:100%;height:100%;border:none;display:block;background:#000;
}
/* SUBTITLE OVERLAY over the player */
#sub-overlay{
  position:absolute;bottom:8%;left:50%;transform:translateX(-50%);
  z-index:20;pointer-events:none;width:92%;text-align:center;display:none;
}
#sub-overlay.visible{ display:block; }
#sub-text{
  background:rgba(0,0,0,.82);color:#fff;font-size:clamp(13px,2.5vw,17px);font-weight:600;
  padding:4px 12px;border-radius:6px;line-height:1.7;
  white-space:pre-line;text-shadow:1px 1px 3px #000;display:inline-block;max-width:100%;
}
.pph{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;color:var(--muted);font-size:13px;
  background:#000;
}
.pph.hidden{display:none}
.pph-icon{font-size:40px}

/* NOW PLAYING BAR */
#stream-name-bar{
  display:none;
  margin-top:10px;
  background:var(--s1);
  border:2px solid var(--accent);
  border-radius:12px;
  padding:12px 16px;
  box-shadow:0 4px 20px rgba(232,23,58,0.15);
}
#stream-name-bar.on{ display:block; }
#stream-name-bar .snb-label{
  font-size:10px;font-weight:800;letter-spacing:1.2px;
  text-transform:uppercase;color:var(--accent);
  margin-bottom:6px;display:flex;align-items:center;gap:5px;
}
#stream-name-bar .snb-title{
  font-size:12px;font-weight:600;color:var(--text);
  word-break:break-all;line-height:1.5;margin-bottom:4px;
}
#stream-name-bar .snb-source{
  font-size:11px;color:var(--muted);margin-top:2px;
}
.ploader{
  display:none;position:absolute;inset:0;
  background:rgba(0,0,0,.6);
  align-items:center;justify-content:center;
}
.ploader.on{display:flex}
.spin{
  width:36px;height:36px;border:3px solid rgba(255,255,255,.15);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* EPISODE GRID */
.epwrap{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;max-height:120px;overflow-y:auto}
.epbtn{
  width:34px;height:34px;border-radius:6px;font-size:11px;font-weight:700;
  border:1px solid var(--border);background:var(--s2);color:var(--text);
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.epbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.epbtn:active{transform:scale(.9)}




.sub-offset{
  background:var(--s3);color:var(--text);border:1px solid var(--border);
  padding:5px 8px;border-radius:6px;font-size:11px;font-weight:600;
  white-space:nowrap;
}
/* sub-overlay CSS merged into player section above */

/* TOAST */
#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);
  background:var(--s3);color:var(--text);
  padding:9px 18px;border-radius:20px;font-size:13px;font-weight:500;
  border:1px solid var(--border);z-index:999;
  transition:transform .3s ease;white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
}
#toast.on{transform:translateX(-50%) translateY(0)}

footer{
  text-align:center;padding:24px;
  color:var(--muted);font-size:10px;
  border-top:1px solid var(--border);
  margin-top:12px;
}

/* SAFE AREA */
@supports(padding-bottom:env(safe-area-inset-bottom)){
  footer{padding-bottom:calc(24px + env(safe-area-inset-bottom))}
}

/* STREAM LIST */
.stream-row {
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;margin-bottom:5px;
  background:var(--s2);border:2px solid var(--border);
  border-radius:10px;cursor:pointer;
  transition:border-color .15s,background .15s,transform .1s;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.stream-row:active { transform:scale(.98); }
.stream-row.active {
  border-color:var(--accent);
  background:var(--accent-dim);
  box-shadow:0 0 0 1px var(--accent);
}
.stream-row-left { display:flex;align-items:center;gap:8px;min-width:0;flex:1; }
.stream-row-right { display:flex;align-items:center;gap:5px;flex-shrink:0; }
.qlabel {
  font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;
  flex-shrink:0;text-transform:uppercase;letter-spacing:.5px;
  white-space:nowrap;
}
.sq-4k   { background:#a855f7;color:#fff; }
.sq-1080 { background:var(--accent);color:#fff; }
.sq-720  { background:#3b82f6;color:#fff; }
.sq-480,.sq-sd { background:var(--s3);color:var(--muted); }
.stream-name {
  font-size:11px;font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  color:var(--text);flex:1;min-width:0;
}
.stream-seeds { font-size:10px;color:var(--green);font-weight:700;flex-shrink:0; }
.stream-size  { font-size:10px;color:var(--muted);flex-shrink:0; }
.stream-play-btn {
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:var(--s3);color:var(--text);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;transition:all .15s;pointer-events:none;
}
.stream-row.active .stream-play-btn {
  background:var(--accent);border-color:var(--accent);color:#fff;
}
</style>
</head>
<body>

<!-- NAV -->
<nav id="nav">
  <div class="logo">CV</div>
  <div id="search-box">
    <span class="si">🔍</span>
    <input type="search" id="sq" placeholder="Search…" autocomplete="off" enterkeyhint="search">
    <button id="search-clear" onclick="clearSearch()">✕</button>
  </div>
  <div id="tabs">
    <button class="tab on" data-c="home">🏠</button>
    <button class="tab" data-c="movies">🎬</button>
    <button class="tab" data-c="hindi">🇮🇳</button>
    <button class="tab" data-c="tv">📺</button>
    <button class="tab" data-c="anime">🎌</button>
    <button class="tab" data-c="korean">🇰🇷</button>
  </div>
</nav>

<!-- HERO -->
<div id="hero">
  <div id="hero-bg"></div>
  <div class="hc">
    <div class="hbadge">⭐ Featured</div>
    <div id="htitle">Loading…</div>
    <div id="hdesc"></div>
    <div class="hmeta">
      <span id="hyear"></span><span>•</span>
      <span class="hrating" id="hrating"></span>
    </div>
    <div class="hbtns">
      <button class="btn-w" id="hplay">▶ Watch</button>
      <button class="btn-i" id="hinfo">ℹ Info</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div class="sec"><div class="sec-title" id="t0">🔥 Trending</div><div class="grid" id="g0"></div></div>
  <div class="sec"><div class="sec-title">🇮🇳 Bollywood</div><div class="grid" id="g1"></div></div>
  <div class="sec"><div class="sec-title">🎌 Anime</div><div class="grid" id="g2"></div></div>
  <div class="sec"><div class="sec-title">🇰🇷 Korean</div><div class="grid" id="g3"></div></div>
</div>

<!-- SEARCH PAGE -->
<div id="spage">
  <div class="spage-title" id="stitle">Results</div>
  <div class="grid" id="sgrid"></div>
</div>

<!-- MODAL -->
<div id="modal">
  <div class="mbox">
    <button class="mclose" id="mclose">✕</button>
    <div class="mback"><img id="mbg" src="" alt=""><div></div></div>
    <div class="mbody">
      <div class="mtitle" id="mtitle"></div>
      <div class="mmeta" id="mmeta"></div>
      <div class="mdesc" id="mdesc"></div>

      <div id="tv-ctrl" style="display:none">
        <div class="crow"><span class="clabel">Season</span><div class="cbtns" id="sbns"></div></div>
        <div class="clabel" style="margin-bottom:6px">Episode</div>
        <div class="epwrap" id="ebns"></div>
      </div>

      <div class="crow" id="src-row">
        <span class="clabel">Source</span>
        <div class="cbtns" id="srcbns"></div>
      </div>

      <div class="player-outer" id="player-outer">
        <div class="pwrap" id="pwrap">
          <div class="pph" id="pph"><div class="pph-icon">🎬</div><div>Loading best source…</div></div>
          <!-- iframe or video inserted here by JS -->
        </div>
        <div id="sub-overlay"><span id="sub-text"></span></div>
      </div>
      <div id="stream-name-bar">
        <div class="snb-label">▶ Now Playing</div>
        <div class="snb-title" id="stream-name-text"></div>
        <div class="snb-source" id="stream-name-source"></div>
      </div>

      <!-- Quality/File selector -->
      <div class="crow" id="file-row" style="display:none;margin-top:10px">
        <span class="clabel">🎬 File</span>
        <div class="cbtns" id="filebns"></div>
      </div>

      <div id="stream-picker" style="display:block;margin-top:14px">
        <div class="clabel" id="stream-label" style="margin-bottom:8px">📊 TORRENT QUALITY — tap row then pick source above</div>

<script>
const $ = id => document.getElementById(id);

// ── CONFIG ──────────────────────────────────────────────────────
// UPDATE this to your deployed Cloudflare Pages URL after deploying worker_fixed.js
const API = "https://test-repo-six-sepia.vercel.app";
const TMDB_KEY = "4ef0d7355d9ffb5151e987764708ce96";

const SOURCES = [
  { name:"2Embed",     useImdb:false, movie:id=>`https://www.2embed.cc/embed/${id}`,                                tv:(id,s,e)=>`https://www.2embed.cc/embedtv/${id}&s=${s}&e=${e}` },

// ── UTILS ────────────────────────────────────────────────────────
const poster = p => p ? `${IMG}w300${p}` : `https://placehold.co/300x450/1a1a28/444?text=No+Poster`;
const back   = p => p ? `${IMG}w1280${p}` : "";

function toast(msg, ms=2500) {
  const t = $("toast"); t.textContent = msg; t.classList.add("on");
  setTimeout(() => t.classList.remove("on"), ms);
}

function buildMagnetLink(hash) {
  return `magnet:?xt=urn:btih:${hash}&tr=udp://tracker.opentrackr.org:1337/announce&tr=udp://open.stealth.si:80/announce&tr=udp://exodus.desync.com:6969/announce&tr=udp://tracker.torrent.eu.org:451/announce`;
}

// ── TMDB ─────────────────────────────────────────────────────────
async function tmdb(path, params={}) {
  const q = new URLSearchParams({ ...params, api_key: TMDB_KEY });
  const r = await fetch(`https://api.themoviedb.org/3${path}?${q}`);
  if (!r.ok) throw new Error(`TMDB ${r.status}`);
  return r.json();
}

// ── QUALITY BADGE ─────────────────────────────────────────────────
function qClass(name) {
  if (/4k|2160/i.test(name))  return ["4K",   "sq-4k"];
  if (/1080/i.test(name))     return ["1080p", "sq-1080"];
  if (/720/i.test(name))      return ["720p",  "sq-720"];
  if (/480/i.test(name))      return ["480p",  "sq-480"];
  return ["SD", "sq-sd"];
}

// ── PLAYER HELPERS ────────────────────────────────────────────────

// Remove only the media element (iframe or video) from pwrap.
// Never wipes pph/sub-overlay — those are permanent DOM nodes.
function clearPlayer() {
  stopVideo();
  const pwrap = $("pwrap");
  if (!pwrap) return;
  // Remove iframe
  const iframe = document.getElementById("pframe");
  if (iframe) iframe.remove();
  // Remove any leftover video or plyr containers
  pwrap.querySelectorAll("video, .plyr").forEach(el => el.remove());
}

function showIframe(url, nameLabel) {
  clearPlayer();
  const iframe = document.createElement("iframe");
  iframe.id = "pframe";
  iframe.allowFullscreen = true;
  iframe.allow = "autoplay; fullscreen; picture-in-picture; encrypted-media; clipboard-write";
  iframe.referrerPolicy = "no-referrer";
  iframe.style.cssText = "position:absolute;inset:0;width:100%;height:100%;border:none;display:block";
  iframe.src = url;
  $("pwrap").appendChild(iframe);
  $("pph").classList.add("hidden");
  setNameBar(nameLabel);
}

function stopVideo() {
  clearSubs();
  if (plyrInstance) { try { plyrInstance.destroy(); } catch(e){} plyrInstance = null; }
  if (currentVideo) { try { currentVideo.pause(); currentVideo.remove(); } catch(e){} currentVideo = null; }
  document.querySelectorAll(".plyr").forEach(el => { try { el.remove(); } catch(e){} });
}

function setNameBar(label) {
  $("stream-name-text").textContent = label || "";
  $("stream-name-source").textContent = "";
  $("stream-name-bar").classList.add("on");
}

function updateSubtitleBarVisibility() {
  $("subbar").classList.toggle("visible", !!currentVideo);
}

function updateMmeta() {
  if (!cur) return;
  const ep = (cur.mediaType === "movie") ? "" : ` · S${curS} E${curE}`;
  const epHtml = ep ? `<span>•</span><span style="color:var(--accent);font-weight:700">${ep.trim()}</span>` : "";
  $("mmeta").innerHTML =
    `<span>${cur._year||""}</span><span>•</span>` +
    `<span class="mrating">⭐${cur._rating||"—"}</span><span>•</span>` +
    `<span>${cur.mediaType==="movie"?"🎬 Movie":"📺 Series"}</span>` + epHtml;
}

// ── SOURCE BUTTONS ────────────────────────────────────────────────
function buildSources() {
  const wrap = $("srcbns");
  wrap.innerHTML = "";
  SOURCES.forEach((src, i) => {
    const b = document.createElement("button");
    b.className = "cbtn" + (i === 0 ? " on" : "");
    b.textContent = src.name;

    wrap.appendChild(b);

}

function loadSource(i) {
  if (!cur) return;
  srcIdx = i;
  const src = SOURCES[i];
  if (!src) return;
  document.querySelectorAll("#srcbns .cbtn").forEach((b, j) => b.classList.toggle("on", j === i));
  const isMovie = cur.mediaType === "movie";
  const id = src.useImdb ? (cur.imdb_id || cur.id) : cur.id;
  if (!id) { toast("⏳ IMDb ID not ready — try again in a moment"); return; }
  const url = isMovie ? src.movie(id) : src.tv(id, curS, curE);
  const label = `${cur.title || cur.name || ""}${isMovie ? "" : ` · S${curS}E${curE}`} — ${src.name}`;
  showIframe(url, label);
  toast("▶ " + src.name);
}

// ── TORRENT PLAYER ────────────────────────────────────────────────
async function playTorrent(infoHash, fileIdx, title) {
  if (!webtorrentClient) webtorrentClient = new WebTorrent();

  clearPlayer();
  const pwrap = $("pwrap");

  // ── Start subtitle fetch immediately — parallel to torrent connecting ──
  const subPromise = cur?.imdb_id
    ? fetchSubCues(cur.imdb_id, curS, curE, "en").catch(() => [])
    : Promise.resolve([]);

  // ── Create video element ──
  const video = document.createElement("video");
  video.id = "torrent-video";
  video.crossOrigin = "anonymous";
  video.playsInline = true;
  video.controls = true; // native controls until Plyr wraps it
  video.style.cssText = "position:absolute;inset:0;width:100%;height:100%;background:#000;display:block";
  pwrap.appendChild(video);
  currentVideo = video;
  $("pph").classList.add("hidden");
  setNameBar(title + " — Torrent");
  toast("⏳ Connecting to peers…");

  const magnet = buildMagnetLink(infoHash);
  const torrentTimeout = setTimeout(() => {
    toast("❌ Timed out — no peers. Try another.");
    const pph = $("pph");
    if (pph) { pph.classList.remove("hidden"); pph.innerHTML = '<div class="pph-icon">⏱️</div><div>No peers. Try another torrent.</div>'; }
  }, 45000);

  try {
    webtorrentClient.add(magnet, {
      announce: ["wss://tracker.openwebtorrent.com","wss://tracker.btorrent.xyz","wss://tracker.fastcast.nz"]
    }, torrent => {
      clearTimeout(torrentTimeout);

      const vids = torrent.files
        .filter(f => /\.(mp4|mkv|avi|mov|wmv|webm|m4v)$/i.test(f.name))
        .sort((a, b) => b.length - a.length);

      if (!vids.length) {
        toast("❌ No video file in torrent");
        const pph = $("pph");
        if (pph) { pph.classList.remove("hidden"); pph.innerHTML = '<div class="pph-icon">⚠️</div><div>No video file.</div>'; }
        return;
      }

      const file = vids[Math.min(fileIdx, vids.length - 1)];
      toast("🎬 " + file.name.slice(0, 40));

      // ── Step 1: WebTorrent sets video.src to a streaming blob URL ──
      file.renderTo(video, { autoplay: true }, async err => {
        if (err) { toast("❌ Playback error"); return; }

        // ── Step 2: Wait for subs (likely already done by now) ──
        const cues = await subPromise;
        const vttBlobUrl = cues.length ? buildVTTBlobUrl(cues) : null;

        // ── Step 3: Inject <track> child into video BEFORE Plyr wraps it ──
        // Plyr reads existing <track> elements during init and wires up its CC button
        if (vttBlobUrl) {
          const track = document.createElement("track");
          track.kind    = "captions";
          track.label   = "English";
          track.srclang = "en";
          track.src     = vttBlobUrl;
          track.default = true;
          video.appendChild(track);
        }

        // ── Step 4: Init Plyr — wraps the video, reads <track>, builds CC button ──
        try {
          plyrInstance = new Plyr(video, {
            controls: ["play-large","play","rewind","fast-forward","progress",
                       "current-time","duration","mute","volume",
                       "captions","settings","pip","fullscreen"],
            settings: ["captions","speed"],
            speed:    { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] },
            captions: { active: !!vttBlobUrl, update: true },
            tooltips: { controls: true, seek: true },
            fullscreen:{ enabled: true, fallback: true, iosNative: true },
          });
          currentVideo = plyrInstance.media || video;
        } catch(e) {
          console.warn("Plyr init failed:", e);
          currentVideo = video;
        }

        // ── Step 5: Show sub language switcher below player ──
        showSubLangBar("en", cues.length > 0);
        if (cues.length) toast("▶ Playing · 🔤 EN subs active");
        else             toast("▶ Playing · select language below for subs");
      });
    });
  } catch(err) {
    clearTimeout(torrentTimeout);
    toast("❌ Torrent load failed");
  }
}



// ── STREAMS ───────────────────────────────────────────────────────
async function fetchStreams(imdbId, isTv, s, e) {
  const type = isTv ? "series" : "movie";
  const stremioId = isTv ? `${imdbId}:${s}:${e}` : imdbId;
  // Primary: our Vercel API — needs up to 15s (TMDB + apibay)
  const primaryUrl = `${API}/stream/${type}/${encodeURIComponent(stremioId)}.json`;
  // Fallback: torrentio public Stremio addon
  const fallbackUrl = `https://torrentio.strem.fun/stream/${type}/${stremioId}.json`;

  for (const url of [primaryUrl, fallbackUrl]) {
    try {
      const ctrl = new AbortController();
      // 25s timeout — Vercel hobby functions can take up to ~15s (TMDB 5s + apibay 10s)
      const t = setTimeout(() => ctrl.abort(), 25000);
      const r = await fetch(url, { signal: ctrl.signal });
      clearTimeout(t);
      if (!r.ok) continue;
      const d = await r.json();
      const streams = Array.isArray(d.streams) ? d.streams : [];
      // Filter out fake fallback streams (zero hash = apibay found nothing)
      const real = streams.filter(s =>
        s.infoHash && !/^0+$/.test(s.infoHash) && s.infoHash.length === 40
      );
      if (real.length) return real.slice(0, 15);
    } catch { continue; }
  }
  return [];
}

function buildStreamPicker(streams) {
  const wrap = $("streambns");
  wrap.innerHTML = "";
  $("stream-loading").style.display = "none";
  if (!streams.length) { $("stream-picker").style.display = "none"; return; }
  $("stream-picker").style.display = "block";
  const lbl = $("stream-label");
  if (lbl) lbl.textContent = "📊 AVAILABLE TORRENTS — tap to play";
  streams.forEach(s => {
    const lines = (s.title || s.name || "").split("\n");
    const fname = lines[0] || "Unknown";
    const meta  = lines.slice(1).join(" ");
    const seeds = (meta.match(/👤\s*(\d+)/) || [])[1] || "";
    const size  = (meta.match(/💾\s*([\d.]+\s*(?:GB|MB|KB|B))/) || [])[1] || "";
    const [ql, qc] = qClass(fname);
    let lang = "";
    if      (/hindi/i.test(fname+meta))    lang = "🇮🇳 ";
    else if (/korean/i.test(fname+meta))   lang = "🇰🇷 ";
    else if (/japanese/i.test(fname+meta)) lang = "🇯🇵 ";
    const row = document.createElement("div");
    row.className = "stream-row";
    row.innerHTML =
      `<div class="stream-row-left">` +
        `<span class="qlabel ${qc}">${ql}</span>` +
        `<span class="stream-name">${lang}${fname}</span>` +
      `</div>` +
      `<div class="stream-row-right">` +
        (seeds ? `<span class="stream-seeds">👤${seeds}</span>` : '') +
        (size  ? `<span class="stream-size">💾${size}</span>`  : '') +
        `<span class="stream-play-btn">▶</span>` +
      `</div>`;
    // Attach stream data directly
    row._hash    = s.infoHash || "";
    row._fileIdx = typeof s.fileIdx === "number" ? s.fileIdx : 0;
    row._title   = fname;
    row.onclick  = () => {
      document.querySelectorAll(".stream-row").forEach(x => x.classList.remove("active"));
      row.classList.add("active");
      if (row._hash) {
        const title = (cur.title || cur.name || "") + (cur.mediaType==="movie" ? "" : ` S${curS}E${curE}`);
        playTorrent(row._hash, row._fileIdx, title);
      } else {
        loadSource(srcIdx);
      }
    };
    wrap.appendChild(row);
  });
}

async function loadDirectStreams() {
  if (!cur || !cur.imdb_id) {
    $("stream-loading").style.display = "block";
    $("stream-loading").textContent = "⚠️ No IMDb ID — streams unavailable";
    return;
  }
  const isTv = cur.mediaType === "tv" || cur.mediaType === "series";
  const snapS = curS, snapE = curE;
  const cacheKey = `${cur.imdb_id}|${snapS}|${snapE}`;
  if (cacheKey === _cacheKey && _cachedStreams.length) {
    buildStreamPicker(_cachedStreams);
    return;
  }
  $("stream-picker").style.display = "block";
  $("stream-loading").style.display = "block";
  $("stream-loading").textContent = "🔄 Searching torrents… (may take 10-20s)";
  $("streambns").innerHTML = "";
  // Pulse the loading text so user knows it's working
  let dots = 0;
  const pulse = setInterval(() => {
    dots = (dots + 1) % 4;
    const el = $("stream-loading");
    if (el && el.style.display !== "none")
      el.textContent = "🔄 Searching torrents" + ".".repeat(dots) + " (this can take ~15s)";
  }, 1500);
  try {
    const streams = await fetchStreams(cur.imdb_id, isTv, snapS, snapE);
    clearInterval(pulse);
    // Only render if user hasn't switched episode while loading
    if (snapS !== curS || snapE !== curE) return;
    _cachedStreams = streams; _cacheKey = cacheKey;
    if (!streams.length) {
      $("stream-loading").style.display = "block";
      $("stream-loading").textContent = "⚠️ No torrents found — try a different source above";
    } else {
      buildStreamPicker(streams);
    }
  } catch(err) {
    clearInterval(pulse);
    $("stream-loading").style.display = "block";
    $("stream-loading").textContent = "⚠️ Stream fetch failed — try again";
    console.error("loadDirectStreams error:", err);
  }
}

// ── SEASONS / EPISODES ────────────────────────────────────────────
async function loadSeasons(tvId) {
  const wrap = $("sbns"); wrap.innerHTML = "";
  try {
    const d = await tmdb(`/tv/${tvId}`);
    const seasons = (d.seasons || []).filter(s => s.season_number > 0);
    seasons.forEach(s => {
      const b = document.createElement("button");

        b.classList.add("on");
        curS = s.season_number; curE = 1;

        await loadEps(tvId, curS);

  cur = { ...item, mediaType: type };

  const isTv = type === "tv" || type === "series";

  // Populate modal header
  $("mtitle").textContent = item.title || item.name;

  // Reset player area

  clearPlayer();
  const _pph = $("pph");
  if (_pph) { _pph.classList.remove("hidden"); _pph.innerHTML = '<div class="pph-icon">⏳</div><div>Fetching info…</div>'; }
  $("stream-name-bar").classList.remove("on");
  $("streambns").innerHTML = "";
  $("stream-loading").style.display = "block";
  $("stream-loading").textContent = "🔄 Loading streams…";
  $("stream-picker").style.display = "block";
  $("tv-ctrl").style.display = isTv ? "block" : "none";

  // Immediately load source 0 if it doesn't need IMDb ID (2Embed = TMDB id only)
  // This makes video start playing right away without waiting for IMDb fetch
  if (!SOURCES[0].useImdb) loadSource(0);

  // Async: fetch IMDb ID in background, then seasons + streams
  (async () => {
    // Step 1: IMDb ID (needed for some sources + all stream fetching)
    if (!cur.imdb_id) {
      try {
        const ext = await tmdb(`/${isTv?"tv":"movie"}/${item.id}/external_ids`);
        cur.imdb_id = ext.imdb_id || null;

    if (SOURCES[0].useImdb) loadSource(0);

    loadDirectStreams();
  })();
}

// ── SUBTITLE SYSTEM ─────────────────────────────────────────────────
// Plyr handles all sync natively via its <track> / TextTrack engine.
// Offset buttons shift cue timestamps on the live TextTrack directly.
let _subOffset = 0;

// Build a WebVTT blob URL from cue array — Plyr / browsers accept this as a <track src>
function buildVTTBlobUrl(cues) {
  const pad  = (n, w=2) => String(n).padStart(w, "0");
  const hms  = s => `${pad(Math.floor(s/3600))}:${pad(Math.floor(s%3600/60))}:${pad((s%60).toFixed(3),6)}`;
  const body = cues.map((c,i) => `${i+1}\n${hms(c.start)} --> ${hms(c.end)}\n${c.text}`).join("\n\n");
  return URL.createObjectURL(new Blob(["WEBVTT\n\n" + body], { type: "text/vtt" }));
}

// Hot-swap: load a new language and inject into the running Plyr player
async function switchSubLang(lang) {
  if (!cur?.imdb_id) { toast("No IMDb ID"); return; }
  toast("🔤 Fetching " + lang.toUpperCase() + "…");
  try {
    const cues = await fetchSubCues(cur.imdb_id, curS, curE, lang);
    if (!cues.length) { toast("⚠️ No subs for " + lang.toUpperCase()); return; }
    const blobUrl = buildVTTBlobUrl(cues);
    const vid = currentVideo;
    if (!vid) return;

    // Remove old tracks
    Array.from(vid.querySelectorAll("track")).forEach(t => t.remove());

    // Add new track
    const track = document.createElement("track");
    track.kind    = "captions";
    track.label   = lang.toUpperCase();
    track.srclang = lang;
    track.src     = blobUrl;
    track.default = true;
    vid.appendChild(track);

    // Force Plyr to rescan tracks and activate captions
    if (plyrInstance) {
      try {
        plyrInstance.captions.active = false;
        setTimeout(() => { if (plyrInstance) { plyrInstance.captions.active = true; } }, 80);
      } catch(e) {}
    } else {
      if (vid.textTracks[0]) vid.textTracks[0].mode = "showing";
    }
    _subOffset = 0;
    toast("🔤 " + lang.toUpperCase() + " subs loaded");
  } catch(e) { toast("⚠️ Subtitle error"); console.error(e); }
}

// Offset: shift live TextTrack cue timestamps — Plyr re-renders at new times
function offsetSubtitles(seconds) {
  const vid = currentVideo;
  if (!vid) return;
  _subOffset += seconds;
  for (let ti = 0; ti < vid.textTracks.length; ti++) {
    const tt = vid.textTracks[ti];
    if (!tt.cues) continue;
    for (let ci = 0; ci < tt.cues.length; ci++) {
      tt.cues[ci].startTime += seconds;
      tt.cues[ci].endTime   += seconds;
    }
  }
  toast(`Sub ${_subOffset >= 0 ? "+" : ""}${_subOffset.toFixed(1)}s`);
}

// Pure data fetch — returns Promise<cue[]>
async function fetchSubCues(imdbId, season, episode, lang) {
  const langMap = {en:"eng",hi:"hin",ar:"ara",fr:"fre",es:"spa",de:"ger",
                   pt:"por",it:"ita",ja:"jpn",ko:"kor",zh:"chi"};
  const imdbNum = imdbId.replace("tt","");
  let url = `https://rest.opensubtitles.org/search/imdbid-${imdbNum}/sublanguageid-${langMap[lang]||"eng"}`;
  if (season)  url += `/season-${season}`;
  if (episode) url += `/episode-${episode}`;
  const r = await fetch(url, { headers:{ "X-User-Agent":"TemporaryUserAgent" } });
  if (!r.ok) return [];
  const subs = await r.json();
  if (!Array.isArray(subs) || !subs.length) return [];
  const epStr = season ? "S"+String(season).padStart(2,"0")+"E"+String(episode).padStart(2,"0") : "";
  const sub = epStr
    ? (subs.find(s=>s.SubFormat==="srt"&&(s.SubFileName||"").toUpperCase().includes(epStr))
       ||subs.find(s=>s.SubFormat==="srt")||subs[0])
    : (subs.find(s=>s.SubFormat==="srt")||subs[0]);
  if (!sub?.SubDownloadLink) return [];
  const txt = await downloadAndDecompress(sub.SubDownloadLink);
  return parseSRT(txt||"");
}

async function downloadAndDecompress(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error("failed");
  const buf = await r.arrayBuffer();
  try {
    const ds = new DecompressionStream("gzip");
    const w  = ds.writable.getWriter();
    w.write(new Uint8Array(buf)); w.close();
    const chunks=[]; const rd=ds.readable.getReader();
    for(;;){const{done,value}=await rd.read();if(done)break;chunks.push(value);}
    const out=new Uint8Array(chunks.reduce((n,c)=>n+c.length,0));
    let p=0;chunks.forEach(ch=>{out.set(ch,p);p+=ch.length;});
    return new TextDecoder().decode(out);
  } catch { return new TextDecoder().decode(buf); }
}

function parseSRT(text) {
  const cues=[];
  for (const block of text.replace(/\r/g,"").trim().split(/\n\s*\n/)) {
    const lines=block.trim().split("\n");
    const tl=lines.find(l=>l.includes("-->"));
    if (!tl) continue;
    const [s1,s2]=tl.split("-->").map(s=>s.trim());
    const toSec=t=>{const m=t.match(/(\d+):(\d+):(\d+)[,.](\d+)/);return m?+m[1]*3600+ +m[2]*60+ +m[3]+ +m[4]/1000:0;};
    const txt=lines.slice(lines.indexOf(tl)+1).join("\n").replace(/<[^>]+>/g,"").replace(/\{[^}]+\}/g,"").trim();
    if (txt) cues.push({start:toSec(s1),end:toSec(s2),text:txt});
  }
  return cues.sort((a,b)=>a.start-b.start);
}

// Language bar rendered below the player during torrent playback
function showSubLangBar(activeLang, subsLoaded) {
  let bar = $("sub-lang-bar");
  if (bar) bar.remove();
  bar = document.createElement("div");
  bar.id = "sub-lang-bar";
  bar.style.cssText = "display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-top:8px;padding:8px 12px;background:var(--s2);border-radius:10px;border:1px solid var(--border)";

  const lbl = document.createElement("span");
  lbl.style.cssText = "font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;flex-shrink:0";
  lbl.textContent = "🔤 Subs";
  bar.appendChild(lbl);

  const LANGS = [{c:"en",n:"EN"},{c:"hi",n:"HI"},{c:"ar",n:"AR"},{c:"fr",n:"FR"},
                 {c:"es",n:"ES"},{c:"de",n:"DE"},{c:"pt",n:"PT"},{c:"ja",n:"JA"},{c:"ko",n:"KO"},{c:"zh",n:"ZH"}];
  LANGS.forEach(({c,n}) => {
    const btn = document.createElement("button");
    btn.className = "cbtn" + (c === activeLang && subsLoaded ? " on" : "");
    btn.textContent = n;
    btn.style.cssText = "padding:3px 8px;font-size:10px";
    btn.onclick = () => {
      bar.querySelectorAll(".cbtn").forEach(b=>b.classList.remove("on"));
      btn.classList.add("on");
      switchSubLang(c);
    };
    bar.appendChild(btn);
  });

  const spacer = document.createElement("span"); spacer.style.flex="1"; bar.appendChild(spacer);

  // Offset & off buttons
  [{t:"−0.5s",v:-0.5},{t:"+0.5s",v:0.5},{t:"✕ Off",v:null}].forEach(({t,v})=>{
    const btn=document.createElement("button");
    btn.className="cbtn"; btn.textContent=t;
    btn.style.cssText="padding:3px 8px;font-size:10px";
    btn.onclick=()=>{
      if (v===null) {
        if(plyrInstance){try{plyrInstance.captions.active=false;}catch(e){}}
        if(currentVideo){for(let i=0;i<currentVideo.textTracks.length;i++)currentVideo.textTracks[i].mode="disabled";}
        bar.querySelectorAll(".cbtn").forEach(b=>b.classList.remove("on"));
        toast("🔤 Subs off");
      } else { offsetSubtitles(v); }
    };
    bar.appendChild(btn);
  });

  $("player-outer").insertAdjacentElement("afterend", bar);
}

function clearSubs() {
  _subOffset = 0;
  const bar = $("sub-lang-bar");
  if (bar) bar.remove();
}


// ── CARDS ─────────────────────────────────────────────────────────
function makeCard(item, type) {
  const title  = item.title || item.name || "Unknown";
  const year   = (item.release_date || item.first_air_date || "").slice(0,4);
  const rating = item.vote_average?.toFixed(1) || "—";
  const d = document.createElement("div");
  d.className = "card";
  d.innerHTML =
    `<img class="cposter" src="${poster(item.poster_path)}" alt="${title}" loading="lazy">` +
    `<div class="cov"><div class="pbc">▶</div></div>` +
    `<div class="cinfo"><div class="ctitle">${title}</div>` +
    `<div class="cmeta"><span>${year}</span><span class="crating">⭐${rating}</span></div></div>`;
  d.onclick = () => openModal(item, type);
  return d;
}

function skels(el, n=8) {
  el.innerHTML = "";
  for (let i=0;i<n;i++) { const d=document.createElement("div"); d.className="sk"; el.appendChild(d); }
}

function setHero(item, type) {
  $("hero-bg").style.backgroundImage = `url(${back(item.backdrop_path)})`;
  $("htitle").textContent  = item.title || item.name;
  $("hdesc").textContent   = item.overview || "";
  $("hyear").textContent   = (item.release_date || item.first_air_date || "").slice(0,4);
  $("hrating").textContent = `⭐ ${item.vote_average?.toFixed(1)||"—"}`;
  $("hplay").onclick = () => openModal(item, type);
  $("hinfo").onclick = () => openModal(item, type);
}

async function loadSec(gid, path, params, type, hero=false) {
  const g = $(gid); skels(g);
  try {
    const d = await tmdb(path, params);
    const items = d.results || [];
    g.innerHTML = "";
    if (hero && items.length) setHero(items[0], items[0].media_type || type);
    items.slice(0,12).forEach(it => g.appendChild(makeCard(it, it.media_type || type)));
  } catch(e) {
    console.error("loadSec error:", e);
    g.innerHTML = `<div class="sempty"><div class="sempty-icon">⚠️</div>Failed to load</div>`;
  }
}

// ── SEARCH ────────────────────────────────────────────────────────
const searchInput = $("sq");
searchInput.addEventListener("input", e => {
  const q = e.target.value.trim();
  $("search-clear").style.display = q ? "block" : "none";
  clearTimeout(searchTimer);
  if (!q) { hideSearch(); return; }
  searchTimer = setTimeout(() => showSearch(q), 350);
});
searchInput.addEventListener("keydown", e => { if(e.key==="Enter") { e.target.blur(); } });
searchInput.addEventListener("focus",   () => { if(searchInput.value.trim()) showSearch(searchInput.value.trim()); });

function clearSearch() {
  searchInput.value = "";
  $("search-clear").style.display = "none";
  hideSearch();
}

function showSearch(q) {
  $("main").style.display = "none";
  $("hero").style.display = "none";
  $("spage").classList.add("on");
  $("stitle").textContent = `"${q}"`;
  const g = $("sgrid"); skels(g, 6);
  tmdb("/search/multi", { query: q }).then(d => {
    const items = (d.results||[]).filter(i => i.media_type!=="person");
    g.innerHTML = "";
    if (!items.length) {
      g.innerHTML = `<div class="sempty"><div class="sempty-icon">🎬</div>No results for "${q}"</div>`;
      return;
    }
    items.slice(0,20).forEach(it => g.appendChild(makeCard(it, it.media_type||"movie")));
  }).catch(() => {
    g.innerHTML = `<div class="sempty"><div class="sempty-icon">⚠️</div>Search failed</div>`;
  });
}

function hideSearch() {
  $("main").style.display = "block";
  $("hero").style.display = "flex";
  $("spage").classList.remove("on");
}

// ── TABS ──────────────────────────────────────────────────────────
document.querySelectorAll(".tab").forEach(tab => {
  tab.onclick = async () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("on"));
    tab.classList.add("on");
    clearSearch();
    const c = tab.dataset.c;
    const secs = document.querySelectorAll("#main .sec");
    secs.forEach(s => s.style.display="none");
    const show = id => document.querySelector(`#${id}`)?.closest(".sec")?.style.setProperty("display","block");
    if (c==="home") {
      secs.forEach(s => s.style.display="block");
      $("hero").style.display="flex";
    } else if (c==="movies") {
      $("hero").style.display="flex"; show("g0");
      $("t0").textContent="🎬 Popular Movies";
      skels($("g0")); loadSec("g0","/discover/movie",{sort_by:"popularity.desc"},"movie",true);
    } else if (c==="hindi") {
      $("hero").style.display="none"; show("g1");
    } else if (c==="tv") {
      $("hero").style.display="flex"; show("g0");
      $("t0").textContent="📺 Popular TV Shows";
      skels($("g0")); loadSec("g0","/discover/tv",{sort_by:"popularity.desc"},"tv",true);
    } else if (c==="anime") {
      $("hero").style.display="none"; show("g2");
    } else if (c==="korean") {
      $("hero").style.display="none"; show("g3");
    }
  };
});

// ── PWA ───────────────────────────────────────────────────────────
if ("serviceWorker" in navigator) {
  const swCode = `const CACHE="cv-v3";const SHELL=["/"];self.addEventListener("install",e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(SHELL)).catch(()=>{})));self.addEventListener("fetch",e=>{if(["tmdb","opensubtitles","torrentio","vercel.app","workers.dev","apibay","torrents-csv","nyaa.si"].some(s=>e.request.url.includes(s)))return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});`;
  const blob = new Blob([swCode],{type:"application/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

// ── INIT ──────────────────────────────────────────────────────────
async function init() {
  try { await tmdb("/configuration"); } catch(e) { toast("⚠️ TMDB connection failed"); return; }
  await loadSec("g0","/trending/all/week",{},"movie",true);
  loadSec("g1","/discover/movie",{with_original_language:"hi",sort_by:"popularity.desc"},"movie");
  loadSec("g2","/discover/tv",{with_genres:"16",with_original_language:"ja",sort_by:"popularity.desc"},"tv");
  loadSec("g3","/discover/movie",{with_original_language:"ko",sort_by:"popularity.desc"},"movie");
}
init();
</script>
