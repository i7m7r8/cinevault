<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CineVault">
<meta name="description" content="Free movies & TV streaming">
<link rel="manifest" href="manifest.json">
<title>CineVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.plyr.io/3.8.4/plyr.css">
<script src="https://cdn.plyr.io/3.8.4/plyr.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<style>
:root {
  --bg:#0d0d14;--s1:#13131e;--s2:#1a1a28;--s3:#222235;
  --border:rgba(255,255,255,0.07);--accent:#e8173a;--accent-dim:rgba(232,23,58,0.15);
  --gold:#fbbf24;--green:#10b981;--text:#f2f2f8;--muted:#6b6b8a;--r:10px;--nav-h:58px;
}
@media(prefers-color-scheme:light){
  :root{--bg:#f0f0f7;--s1:#ffffff;--s2:#f8f8ff;--s3:#ededfa;--border:rgba(0,0,0,0.08);--text:#0d0d14;--muted:#8080a0;}
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
img{display:block}
button{cursor:pointer;font-family:'DM Sans',sans-serif}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}

/* Subtitle overlay — works on top of ANY iframe or video */
#sub-overlay{
  position:absolute;bottom:54px;left:0;right:0;
  text-align:center;pointer-events:none;z-index:20;
  padding:0 8px;
}
#sub-overlay span{
  display:inline-block;
  background:rgba(0,0,0,0.85);color:#fff;
  font-size:clamp(13px,2.4vw,19px);font-weight:600;
  padding:4px 12px;border-radius:6px;
  text-shadow:1px 1px 3px #000;line-height:1.65;
  max-width:90%;word-break:break-word;
}
/* Sub controls bar */
#sub-ctrl{
  display:none;position:absolute;top:8px;right:8px;z-index:21;
  display:flex;gap:4px;
}
#sub-ctrl button{
  background:rgba(0,0,0,0.65);color:#fff;border:1px solid rgba(255,255,255,0.2);
  border-radius:5px;font-size:10px;font-weight:700;padding:3px 7px;cursor:pointer;
  backdrop-filter:blur(4px);
}
#sub-ctrl button:hover{background:var(--accent);}
#sub-ctrl.hidden{display:none!important;}

/* NAV */
#nav{position:fixed;top:0;left:0;right:0;z-index:90;height:var(--nav-h);display:flex;align-items:center;gap:10px;padding:0 14px;background:rgba(13,13,20,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
@media(prefers-color-scheme:light){#nav{background:rgba(240,240,247,0.92)}}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:2px;color:var(--accent);text-shadow:0 0 24px rgba(232,23,58,0.5);flex-shrink:0;}
#search-box{flex:1;position:relative;max-width:340px;}
#search-box input{width:100%;background:var(--s2);border:1px solid var(--border);color:var(--text);padding:8px 12px 8px 36px;border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;-webkit-appearance:none;}
#search-box input:focus{border-color:var(--accent)}
#search-box input::placeholder{color:var(--muted)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
#search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:16px;display:none;padding:2px 4px;}
#tabs{display:flex;gap:2px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
#tabs::-webkit-scrollbar{display:none}
.tab{padding:5px 11px;border-radius:7px;font-size:12px;font-weight:600;border:none;background:transparent;color:var(--muted);transition:all .2s;white-space:nowrap;}
.tab.on,.tab:active{background:var(--accent);color:#fff}

/* HERO */
#hero{height:75vw;max-height:520px;min-height:300px;position:relative;display:flex;align-items:flex-end;padding:20px 16px;margin-top:var(--nav-h);overflow:hidden;}
#hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:background-image .6s ease;}
#hero-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(13,13,20,.6) 45%,transparent 100%),linear-gradient(to right,rgba(13,13,20,.8) 0%,transparent 60%);}
@media(prefers-color-scheme:light){#hero-bg::after{background:linear-gradient(to top,var(--bg) 0%,rgba(240,240,247,.6) 45%,transparent 100%),linear-gradient(to right,rgba(240,240,247,.8) 0%,transparent 60%);}}
.hc{position:relative;z-index:2;max-width:420px}
.hbadge{display:inline-flex;align-items:center;gap:4px;background:var(--accent);color:#fff;padding:2px 9px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
#htitle{font-family:'Syne',sans-serif;font-size:clamp(22px,5vw,46px);font-weight:800;line-height:1.05;margin-bottom:6px;}
#hdesc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.hmeta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);margin-bottom:12px}
.hrating{color:var(--gold);font-weight:700}
.hbtns{display:flex;gap:8px}
.btn-w{display:flex;align-items:center;gap:5px;background:var(--accent);color:#fff;border:none;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;transition:all .15s;}
.btn-w:active{transform:scale(.96)}
.btn-i{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);color:var(--text);border:1px solid var(--border);padding:9px 14px;border-radius:8px;font-size:13px;font-weight:500;backdrop-filter:blur(10px);transition:all .15s;}
.btn-i:active{transform:scale(.96)}

/* SECTIONS */
.sec{padding:16px 14px 4px}
.sec-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;}
@media(min-width:480px){.grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}}
@media(min-width:768px){.grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}}

/* CARD */
.card{border-radius:var(--r);overflow:hidden;cursor:pointer;background:var(--s2);border:1px solid var(--border);transition:transform .2s,box-shadow .2s;position:relative;}
@media(hover:hover){.card:hover{transform:translateY(-3px) scale(1.02);border-color:var(--accent);box-shadow:0 6px 20px rgba(232,23,58,.2);z-index:2}.card:hover .cov{opacity:1}}
.card:active{transform:scale(.97)}
.cposter{width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--s3)}
.cinfo{padding:6px 8px 8px}
.ctitle{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.cmeta{display:flex;justify-content:space-between;font-size:10px;color:var(--muted)}
.crating{color:var(--gold);font-weight:700}
.cov{position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;border-radius:var(--r);}
.pbc{width:40px;height:40px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}
.sk{border-radius:var(--r);aspect-ratio:2/3;background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:sh 1.4s infinite;}
@keyframes sh{to{background-position:-200% 0}}

/* MODAL */
#modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);display:none;align-items:flex-start;justify-content:center;padding:8px 8px 40px;overflow-y:auto;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);-webkit-overflow-scrolling:touch;}
#modal.on{display:flex}
.mbox{background:var(--s1);border-radius:16px;width:100%;max-width:820px;margin:auto;border:1px solid var(--border);overflow:visible;position:relative;}
.mclose{position:absolute;top:8px;right:8px;z-index:10;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.7);border:1px solid var(--border);color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;}
.mclose:active{transform:scale(.9)}
.mback{width:100%;aspect-ratio:16/9;background:#000;position:relative;overflow:hidden}
.mback img{width:100%;height:100%;object-fit:cover;opacity:.45}
.mback::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,var(--s1),transparent 55%);}
.mbody{padding:14px 16px 40px;overflow-x:hidden}
.mtitle{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:5px}
.mmeta{display:flex;flex-wrap:wrap;gap:7px;font-size:11px;color:var(--muted);margin-bottom:8px;align-items:center}
.mrating{color:var(--gold);font-weight:700}
.mdesc{font-size:12px;line-height:1.7;color:var(--muted);margin-bottom:14px}
.crow{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;align-items:center}
.clabel{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-right:2px;white-space:nowrap}
.cbtns{display:flex;gap:4px;flex-wrap:wrap}
.cbtn{padding:5px 11px;border-radius:6px;font-size:11px;font-weight:600;border:1px solid var(--border);background:var(--s2);color:var(--text);transition:all .15s;white-space:nowrap;}
.cbtn:active{transform:scale(.94)}
.cbtn.on,.cbtn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.fp-btn{padding:5px 11px;border-radius:6px;font-size:11px;font-weight:700;border:none;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;cursor:pointer;transition:all .15s;white-space:nowrap;}
.fp-btn:hover{background:linear-gradient(135deg,#15803d,#166534);transform:scale(1.04);}
.fp-btn.on{box-shadow:0 0 0 2px #4ade80;}
/* ── Plyr CineVault Theme ── */
:root{--plyr-color-main:#e8173a;--plyr-video-background:#000;--plyr-font-family:'DM Sans',system-ui,sans-serif;--plyr-font-size-base:14px;--plyr-control-radius:6px;--plyr-range-thumb-height:14px;--plyr-range-thumb-width:14px;}
.plyr{height:100%;width:100%;position:absolute;inset:0;}
.plyr--video .plyr__controls{background:linear-gradient(transparent,rgba(0,0,0,0.75));}
.plyr__control--overlaid{background:#e8173a!important;}
.plyr__control--overlaid:hover{background:#c41230!important;}
.plyr__menu__container .plyr__control[role=menuitemradio][aria-checked=true]::before{background:#e8173a;}

/* PLAYER */
.player-outer{position:relative;width:100%;}
.pwrap{width:100%;aspect-ratio:16/9;border-radius:10px;overflow:hidden;background:#000;border:1px solid var(--border);position:relative;}
.pwrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:block;background:#000;}
.pph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-size:13px;background:#000;z-index:5;}
.pph.hidden{display:none}
.pph-icon{font-size:40px}

/* NOW PLAYING BAR */
#stream-name-bar{display:none;margin-top:10px;background:var(--s1);border:2px solid var(--accent);border-radius:12px;padding:12px 16px;box-shadow:0 4px 20px rgba(232,23,58,0.15);}
#stream-name-bar.on{display:block}
#stream-name-bar .snb-label{font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--accent);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
#stream-name-bar .snb-title{font-size:12px;font-weight:600;color:var(--text);word-break:break-all;line-height:1.5;margin-bottom:4px;}
#stream-name-bar .snb-source{font-size:11px;color:var(--muted);margin-top:2px;}

/* EPISODE GRID */
.epwrap{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;max-height:120px;overflow-y:auto}
.epbtn{width:34px;height:34px;border-radius:6px;font-size:11px;font-weight:700;border:1px solid var(--border);background:var(--s2);color:var(--text);display:flex;align-items:center;justify-content:center;transition:all .15s;}
.epbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.epbtn:active{transform:scale(.9)}

/* STREAM LIST */
.stream-row{display:flex;align-items:center;gap:10px;padding:10px 12px;margin-bottom:5px;background:var(--s2);border:2px solid var(--border);border-radius:10px;cursor:pointer;transition:border-color .15s,background .15s,transform .1s;-webkit-tap-highlight-color:transparent;user-select:none;}
.stream-row:active{transform:scale(.98);}
.stream-row.active{border-color:var(--accent);background:var(--accent-dim);box-shadow:0 0 0 1px var(--accent);}
.stream-row-left{display:flex;align-items:center;gap:8px;min-width:0;flex:1;}
.stream-row-right{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.qlabel{font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;flex-shrink:0;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
.sq-4k{background:#a855f7;color:#fff;}.sq-1080{background:var(--accent);color:#fff;}.sq-720{background:#3b82f6;color:#fff;}.sq-480,.sq-sd{background:var(--s3);color:var(--muted);}
.stream-name{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);flex:1;min-width:0;}
.stream-seeds{font-size:10px;color:var(--green);font-weight:700;flex-shrink:0;}
.stream-size{font-size:10px;color:var(--muted);flex-shrink:0;}
.stream-play-btn{width:28px;height:28px;border-radius:50%;flex-shrink:0;background:var(--s3);color:var(--text);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s;pointer-events:none;}
.stream-row.active .stream-play-btn{background:var(--accent);border-color:var(--accent);color:#fff;}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--s3);color:var(--text);padding:9px 18px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--border);z-index:999;transition:transform .3s ease;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3);}
#toast.on{transform:translateX(-50%) translateY(0)}
footer{text-align:center;padding:24px;color:var(--muted);font-size:10px;border-top:1px solid var(--border);margin-top:12px;}
@supports(padding-bottom:env(safe-area-inset-bottom)){footer{padding-bottom:calc(24px + env(safe-area-inset-bottom))}}
#spage{display:none;padding:16px 14px}
#spage.on{display:block}
.spage-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:12px;}
</style>
</head>
<body>

<nav id="nav">
  <div class="logo">CV</div>
  <div id="search-box">
    <span class="si">🔍</span>
    <input type="search" id="sq" placeholder="Search…" autocomplete="off" enterkeyhint="search">
    <button id="search-clear" onclick="clearSearch()">✕</button>
  </div>
  <div id="tabs">
    <button class="tab on" data-c="home">🏠</button>
    <button class="tab" data-c="movies">🎬</button>
    <button class="tab" data-c="hindi">🇮🇳</button>
    <button class="tab" data-c="tv">📺</button>
    <button class="tab" data-c="anime">🎌</button>
    <button class="tab" data-c="korean">🇰🇷</button>
  </div>
</nav>

<div id="hero">
  <div id="hero-bg"></div>
  <div class="hc">
    <div class="hbadge">⭐ Featured</div>
    <div id="htitle">Loading…</div>
    <div id="hdesc"></div>
    <div class="hmeta"><span id="hyear"></span><span>•</span><span class="hrating" id="hrating"></span></div>
    <div class="hbtns">
      <button class="btn-w" id="hplay">▶ Watch</button>
      <button class="btn-i" id="hinfo">ℹ Info</button>
    </div>
  </div>
</div>

<div id="main">
  <div class="sec"><div class="sec-title" id="t0">🔥 Trending</div><div class="grid" id="g0"></div></div>
  <div class="sec"><div class="sec-title">🇮🇳 Bollywood</div><div class="grid" id="g1"></div></div>
  <div class="sec"><div class="sec-title">🎌 Anime</div><div class="grid" id="g2"></div></div>
  <div class="sec"><div class="sec-title">🇰🇷 Korean</div><div class="grid" id="g3"></div></div>
</div>

<div id="spage">
  <div class="spage-title" id="stitle">Results</div>
  <div class="grid" id="sgrid"></div>
</div>

<div id="modal">
  <div class="mbox">
    <button class="mclose" id="mclose">✕</button>
    <div class="mback"><img id="mbg" src="" alt=""><div></div></div>
    <div class="mbody">
      <div class="mtitle" id="mtitle"></div>
      <div class="mmeta" id="mmeta"></div>
      <div class="mdesc" id="mdesc"></div>

      <div id="tv-ctrl" style="display:none">
        <div class="crow"><span class="clabel">Season</span><div class="cbtns" id="sbns"></div></div>
        <div class="clabel" style="margin-bottom:6px">Episode</div>
        <div class="epwrap" id="ebns"></div>
      </div>

      <div class="crow" id="src-row">
        <span class="clabel">Source</span>
        <div class="cbtns" id="srcbns"></div>
      </div>

      <div class="player-outer" id="player-outer">
        <div class="pwrap" id="pwrap">
          <div class="pph" id="pph"><div class="pph-icon">🎬</div><div>Choose a source above to watch</div></div>
          <div id="sub-overlay"></div>
          <div id="sub-ctrl" class="hidden">
            <button onclick="shiftSub(-500)">◀ 0.5s</button>
            <button onclick="toggleSub()">CC</button>
            <button onclick="shiftSub(500)">0.5s ▶</button>
          </div>
        </div>
      </div>

      <div id="stream-name-bar">
        <div class="snb-label">▶ Now Playing</div>
        <div class="snb-title" id="stream-name-text"></div>
        <div class="snb-source" id="stream-name-source"></div>
      </div>

      <div id="stream-picker" style="display:block;margin-top:14px">
        <div class="clabel" id="stream-label" style="margin-bottom:8px">📊 TORRENT QUALITY — tap to play</div>
        <div id="stream-loading" style="font-size:12px;color:var(--muted);padding:8px 0;display:none">🔄 Loading streams…</div>
        <div id="streambns"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>
<footer><strong>CineVault</strong> · Free streaming · For entertainment only</footer>

<script>
// Global error handler
window.onerror = function(message, source, lineno, colno, error) {
  console.error('🔥 GLOBAL ERROR:', message, error);
  return true;
};

console.log('🚀 Script starting...');

// Polyfill for AbortSignal.timeout
if (!AbortSignal.timeout) {
  AbortSignal.timeout = function(ms) {
    const ctrl = new AbortController();
    setTimeout(() => ctrl.abort(), ms);
    return ctrl.signal;
  };
}

const $ = id => document.getElementById(id);
const API = "https://test-repo-six-sepia.vercel.app";
const TMDB_KEY = "4ef0d7355d9ffb5151e987764708ce96";
const IMG = "https://image.tmdb.org/t/p/";

// GLOBAL VARIABLES
let cur = null, curS = 1, curE = 1, srcIdx = 0;
let searchTimer = null;
let _cachedStreams = [], _cacheKey = "";
let _subCues = [], _subOffset = 0, _subVisible = true;
let _subStartWall = null, _subStartOffset = 0;
let _subRafId = null, _subMode = "off";
let _activeVttObjectUrl = null;
let _plyr = null, _plyrHls = null;

console.log('✅ Globals defined');

const SOURCES = [
  { name:"VidSrc",     useImdb:false, movie:id=>`https://vidsrc.icu/embed/movie/${id}`,                                    tv:(id,s,e)=>`https://vidsrc.icu/embed/tv/${id}/${s}/${e}` },
  { name:"2Embed",     useImdb:false, movie:id=>`https://www.2embed.stream/embed/movie/${id}`,                             tv:(id,s,e)=>`https://www.2embed.stream/embed/tv/${id}/${s}/${e}` },
  { name:"VidLink",    useImdb:false, movie:id=>`https://vidlink.pro/movie/${id}?autoplay=true&primaryColor=e8173a`,       tv:(id,s,e)=>`https://vidlink.pro/tv/${id}/${s}/${e}?autoplay=true&primaryColor=e8173a` },

function toast(msg,ms=2500){const t=$("toast");t.textContent=msg;t.classList.add("on");setTimeout(()=>t.classList.remove("on"),ms);}

async function tmdb(path,params={}){
  const q=new URLSearchParams({...params,api_key:TMDB_KEY});
  const r=await fetch(`https://api.themoviedb.org/3${path}?${q}`);
  if(!r.ok) throw new Error(`TMDB ${r.status}`);
  return r.json();
}

function qClass(name){
  if(/4k|2160/i.test(name)) return["4K","sq-4k"];
  if(/1080/i.test(name))    return["1080p","sq-1080"];
  if(/720/i.test(name))     return["720p","sq-720"];
  if(/480/i.test(name))     return["480p","sq-480"];
  return["SD","sq-sd"];
}

// ── TRY AD-FREE DIRECT STREAM ─────────────────────────────────
async function tryAdFreeStream(){
  if(!cur) return;
  document.querySelectorAll("#srcbns .cbtn").forEach(b=>b.classList.remove("on"));
  const fpBtn=$("fp-btn");
  if(fpBtn){ fpBtn.classList.add("on"); fpBtn.textContent="⏳ Loading…"; }
  const isTv=cur.mediaType==="tv"||cur.mediaType==="series";
  const tmdbId=cur.id;
  const title=(cur.title||cur.name||"")+(isTv?` S${curS}E${curE}`:"");
  const typeParam=isTv?"tv":"movie";
  const epParams=isTv?`&s=${curS}&e=${curE}`:"";

  const pph=$("pph");
  if(pph){pph.classList.remove("hidden");pph.innerHTML='<div class="pph-icon">🛡️</div><div>Finding ad-free stream…</div>';}

  // Try get-source first (aggregates vidsrc.icu + vidsrc.me + vidsrc.net)
  try{
    const r=await fetch(`${API}/get-source?tmdb=${tmdbId}&type=${typeParam}${epParams}`,{signal:AbortSignal.timeout(25000)});
    if(r.ok){
      const data=await r.json();
      const best=(data.streams||[])[0];
      if(best?.url){
        if(fpBtn) fpBtn.textContent="🛡️ Ad-Free";
        if(pph) pph.classList.add("hidden");
        toast("▶ Ad-Free · "+(best.provider||"Direct"));
        playWithPlyr(best.url, `${title} [${best.provider||"Direct"}]`);
        return;
      }
    }
  }catch(e){ console.warn("[Ad-Free] get-source:",e.message); }

  // Fallback to direct-stream (vidsrc.net exact port)
  try{
    const r=await fetch(`${API}/direct-stream?tmdb=${tmdbId}&type=${typeParam}${epParams}`,{signal:AbortSignal.timeout(20000)});
    if(r.ok){
      const data=await r.json();
      const best=Array.isArray(data)?data[0]:null;
      if(best?.stream){
        if(fpBtn) fpBtn.textContent="🛡️ Ad-Free";
        if(pph) pph.classList.add("hidden");
        toast("▶ Ad-Free · VidSrc");
        playWithPlyr(best.stream, `${title} [VidSrc]`);
        return;
      }
    }
  }catch(e){ console.warn("[Ad-Free] direct-stream:",e.message); }

  // All failed — fallback to first iframe source
  console.warn("[Ad-Free] all failed, falling back to iframe");
  if(pph) pph.classList.add("hidden");
  if(fpBtn){ fpBtn.textContent="🎬 Player"; fpBtn.classList.remove("on"); }
  loadSource(0);
}

function loadSource(i){
  if(!cur) return;
  srcIdx=i;
  const src=SOURCES[i]; if(!src) return;
  document.querySelectorAll("#srcbns .cbtn").forEach((b,j)=>b.classList.toggle("on",j===i));

  if(!id){toast("⏳ IMDb ID not ready — try again");return;}

  showIframe(url,label);
  toast("▶ "+src.name);
}

// ── PLYR PLAYER (improved) ─────────────────────────────────────
function destroyPlyr() {
  if (_plyrHls)  { try { _plyrHls.destroy(); } catch(e) {} _plyrHls = null; }
  if (_plyr)     { try { _plyr.destroy(); } catch(e) {} _plyr = null; }
  const old = document.getElementById("plyr-video");
  if (old && old.parentNode) old.parentNode.removeChild(old);
  const oldF = document.getElementById("plyr-iframe");
  if (oldF && oldF.parentNode) oldF.parentNode.removeChild(oldF);
}

function playWithPlyr(streamUrl, title) {
  clearPlayer();
  destroyPlyr();
  const pwrap = $("pwrap");
  $("pph").classList.add("hidden");
  setNameBar(title);

  const isHLS   = /m3u8/i.test(streamUrl);
  const isMP4   = /\.mp4/i.test(streamUrl);
  const isDirect = isHLS || isMP4;

  if (!isDirect) {
    // Iframe mode
    const iframe = document.createElement("iframe");
    iframe.id = "plyr-iframe";
    iframe.src = streamUrl;
    iframe.allowFullscreen = true;
    iframe.allow = "autoplay; fullscreen; picture-in-picture; encrypted-media; accelerometer; gyroscope";
    iframe.referrerPolicy = "no-referrer-when-downgrade";
    iframe.style.cssText = "position:absolute;inset:0;width:100%;height:100%;border:none;";
    pwrap.appendChild(iframe);
    toast("🎬 " + title);
    if(cur?.imdb_id) loadAndStartSubs("wall");
    return;
  }

  // Direct video mode
  const vid = document.createElement("video");
  vid.id = "plyr-video";
  vid.setAttribute("playsinline", "");
  vid.setAttribute("webkit-playsinline", "");
  vid.crossOrigin = "anonymous";
  vid.style.cssText = "position:absolute;inset:0;width:100%;height:100%;background:#000;display:block;";
  pwrap.appendChild(vid);

  // Plyr default options – enable debug to see what's happening
  const defaultOptions = {
    debug: true, // remove after fixing
    controls: ["play-large","play","rewind","fast-forward","progress","current-time","duration","mute","volume","captions","settings","pip","fullscreen"],
    settings: ["captions","quality","speed"],
    speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] },
    keyboard: { focused: true, global: true },
    tooltips: { controls: true, seek: true },
    captions: { active: false, language: "auto", update: true },
    fullscreen: { enabled: true, fallback: true, iosNative: false },
    storage: { enabled: true, key: "plyr" },
    ratio: "16:9",
    autoplay: true,
    muted: false
  };

  if (isHLS && window.Hls && Hls.isSupported()) {
    _plyrHls = new Hls({ enableWorker: true, lowLatencyMode: false });
    _plyrHls.loadSource(streamUrl);

    _plyrHls.on(Hls.Events.MANIFEST_PARSED, (e, data) => {
      const levels = _plyrHls.levels.map(l => l.height);
      levels.unshift(0);
      defaultOptions.quality = {
        default: 0,
        options: levels,
        forced: true,
        onChange: (q) => {
          if (q === 0) _plyrHls.currentLevel = -1;
          else {
            _plyrHls.levels.forEach((l, i) => { if (l.height === q) _plyrHls.currentLevel = i; });
          }
        },
      };
      defaultOptions.i18n = { qualityLabel: { 0: "Auto" } };
      _plyrHls.attachMedia(vid);
      _plyr = new Plyr(vid, defaultOptions);
      _plyr.on("ready", () => {
        console.log('✅ Plyr ready, attempting play');
        _plyr.play().catch(e => {
          console.warn('⚠️ Plyr play() failed (maybe autoplay blocked):', e);
          // User may need to click the big play button – that's fine.
        });
        toast("▶ " + title);
        if(cur?.imdb_id) {
          vid.addEventListener("playing", () => loadAndStartSubs("plyr"), { once: true });
        }
      });
      _plyr.on("error", (event) => {
        const err = _plyr.error;
        console.error('❌ Plyr error:', err);
        // Only fall back if it's a fatal error – otherwise keep trying
        // We'll let the user click play again
      });
    });

    _plyrHls.on(Hls.Events.ERROR, (e, data) => {
      if (data.fatal) {
        console.error('❌ HLS fatal error:', data);
        destroyPlyr();
        toast("⚠️ Stream error – try another source");
        // Optionally fall back to iframe, but maybe the user wants to try another quality
      }
    });
  } else {
    // Native HLS (Safari) or MP4
    if (isHLS) {
      vid.src = streamUrl;
    } else {
      const src = document.createElement("source");
      src.src = streamUrl; src.type = "video/mp4";
      vid.appendChild(src);
    }
    _plyr = new Plyr(vid, defaultOptions);
    _plyr.on("ready", () => {
      console.log('✅ Plyr ready, attempting play');
      _plyr.play().catch(e => {
        console.warn('⚠️ Plyr play() failed (maybe autoplay blocked):', e);
      });
      toast("▶ " + title);
      if(cur?.imdb_id) {
        vid.addEventListener("playing", () => loadAndStartSubs("plyr"), { once: true });
      }
    });
    _plyr.on("error", (event) => {
      const err = _plyr.error;
      console.error('❌ Plyr error:', err);
    });
  }
}

// ── SUBTITLE OVERLAY ENGINE ───────────────────────────────────────
function subOverlayStart(mode){
  _subMode=mode;
  if(mode==="wall"){ _subStartWall=Date.now(); _subStartOffset=0; }
  $("sub-ctrl").classList.remove("hidden");
  subOverlayTick();
}

function subOverlayStop(){
  _subMode="off";
  if(_subRafId){cancelAnimationFrame(_subRafId);_subRafId=null;}
  const el=$("sub-overlay"); el.innerHTML="";
  $("sub-ctrl").classList.add("hidden");
}

function subOverlayTick(){
  if(_subMode==="off") return;
  _subRafId=requestAnimationFrame(subOverlayTick);
  let t=0;
  if(_subMode==="plyr" && _plyr){
    const vid = document.getElementById("plyr-video");
    if(vid) t = vid.currentTime + _subOffset/1000;
    else return;
  } else if(_subMode==="wall"){
    t = (Date.now() - _subStartWall)/1000 + _subStartOffset + _subOffset/1000;
  } else return;
  const el=$("sub-overlay");
  if(!el || !_subVisible) return;
  let lo=0, hi=_subCues.length-1, found=null;
  while(lo<=hi){
    const mid=(lo+hi)>>1;
    const c=_subCues[mid];
    if(t>=c.start && t<=c.end){ found=c; break; }
    else if(t<c.start) hi=mid-1;
    else lo=mid+1;
  }
  el.innerHTML = found ? `<span>${found.text.replace(/\n/g,"<br>")}</span>` : "";
}

function shiftSub(ms){ _subOffset+=ms; toast(`Sub offset: ${_subOffset>0?"+":""}${(_subOffset/1000).toFixed(1)}s`); }
function toggleSub(){ _subVisible=!_subVisible; toast(_subVisible?"🔤 Subs ON":"🔤 Subs OFF"); }

async function loadAndStartSubs(mode){
  if(!cur?.imdb_id) return;
  subOverlayStop(); _subOffset=0;
  try{
    const cues=await fetchSubCues(cur.imdb_id, curS, curE, "en");
    if(!cues.length){ toast("⚠️ No subs found"); return; }
    _subCues=cues; _activeCues=cues;
    subOverlayStart(mode);
    toast("🔤 EN subs active");
  }catch(e){ toast("⚠️ Sub fetch failed"); }
}

function cuesToVTT(cues){
  const pad=(n,d=2)=>String(Math.floor(n)).padStart(d,"0");
  const fmt=s=>{
    const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=Math.floor(s%60), ms=Math.round((s%1)*1000);
    return `${pad(h)}:${pad(m)}:${pad(sec)}.${pad(ms,3)}`;
  };
  return "WEBVTT\n\n"+cues.map((c,i)=>`${i+1}\n${fmt(c.start)} --> ${fmt(c.end)}\n${c.text}`).join("\n\n");
}

async function fetchSubCues(imdbId,season,episode,lang){
  const langMap={en:"eng",hi:"hin",ar:"ara",fr:"fre",es:"spa",de:"ger",pt:"por",it:"ita",ja:"jpn",ko:"kor",zh:"chi"};
  const num=imdbId.replace("tt","");
  let url=`https://rest.opensubtitles.org/search/imdbid-${num}/sublanguageid-${langMap[lang]||"eng"}`;
  if(season)  url+=`/season-${season}`;
  if(episode) url+=`/episode-${episode}`;
  const r=await fetch(url,{headers:{"X-User-Agent":"TemporaryUserAgent"}});
  if(!r.ok) return[];
  const subs=await r.json();
  if(!Array.isArray(subs)||!subs.length) return[];
  const ep=season?"S"+String(season).padStart(2,"0")+"E"+String(episode).padStart(2,"0"):"";
  const sub=ep
    ?(subs.find(s=>s.SubFormat==="srt"&&(s.SubFileName||"").toUpperCase().includes(ep)) || subs.find(s=>s.SubFormat==="srt") || subs[0])
    :(subs.find(s=>s.SubFormat==="srt") || subs[0]);
  if(!sub?.SubDownloadLink) return[];
  return parseSRT(await downloadAndDecompress(sub.SubDownloadLink)||"");
}

async function downloadAndDecompress(url){
  const r=await fetch(url); if(!r.ok) throw new Error("failed");
  const buf=await r.arrayBuffer();
  try{
    const ds=new DecompressionStream("gzip"), w=ds.writable.getWriter();
    w.write(new Uint8Array(buf)); w.close();
    const chunks=[], rd=ds.readable.getReader();
    for(;;){ const{done,value}=await rd.read(); if(done)break; chunks.push(value); }
    const out=new Uint8Array(chunks.reduce((n,c)=>n+c.length,0));
    let p=0; chunks.forEach(ch=>{ out.set(ch,p); p+=ch.length; });
    return new TextDecoder().decode(out);
  }catch{ return new TextDecoder().decode(buf); }
}

function parseSRT(text){
  const cues=[];
  for(const block of text.replace(/\r/g,"").trim().split(/\n\s*\n/)){
    const lines=block.trim().split("\n");
    const tl=lines.find(l=>l.includes("-->")); if(!tl) continue;
    const[s1,s2]=tl.split("-->").map(s=>s.trim());
    const toSec=t=>{ const m=t.match(/(\d+):(\d+):(\d+)[,.](\d+)/); return m?+m[1]*3600 + +m[2]*60 + +m[3] + +m[4]/1000 : 0; };
    const txt=lines.slice(lines.indexOf(tl)+1).join("\n").replace(/<[^>]+>/g,"").replace(/\{[^}]+\}/g,"").trim();
    if(txt) cues.push({ start:toSec(s1), end:toSec(s2), text:txt });
  }
  return cues.sort((a,b)=>a.start-b.start);
}

// ── STREAMS ───────────────────────────────────────────────────────
async function fetchStreams(imdbId,isTv,s,e){
  const type=isTv?"series":"movie";
  const stremioId=isTv?`${imdbId}:${s}:${e}`:imdbId;
  try{
    const ctrl=new AbortController();
    const t=setTimeout(()=>ctrl.abort(), 20000);
    const r=await fetch(`${API}/stream/${type}/${encodeURIComponent(stremioId)}.json`,{signal:ctrl.signal});
    clearTimeout(t);
    if(!r.ok) return [];
    const d=await r.json();
    const streams=Array.isArray(d.streams)?d.streams:[];
    return streams.filter(s=>s.url&&/^https?:\/\//i.test(s.url)).slice(0,10);
  }catch{ return []; }
}

function buildStreamPicker(streams, autoPlay=false){
  const wrap=$("streambns"); wrap.innerHTML="";
  $("stream-loading").style.display="none";
  if(!streams.length){ $("stream-picker").style.display="none"; return; }
  $("stream-picker").style.display="block";
  const lbl=$("stream-label");
  if(lbl) lbl.textContent="📊 AVAILABLE STREAMS — tap to play";

  let autoPlayed=false;
  streams.forEach((s,idx)=>{
    const lines=(s.title||s.name||"").split("\n");
    const fname=lines[0]||"Unknown";
    const meta=lines.slice(1).join(" ");
    const seeds=(meta.match(/👤\s*(\d+)/)||[])[1]||"";
    const size=(meta.match(/💾\s*([\d.]+\s*(?:GB|MB|KB|B))/)||[])[1]||"";
    const[ql,qc]=qClass(fname);
    let lang="";
    if(/hindi/i.test(fname+meta)) lang="🇮🇳 ";
    else if(/korean/i.test(fname+meta)) lang="🇰🇷 ";
    else if(/japanese/i.test(fname+meta)) lang="🇯🇵 ";

    const row=document.createElement("div");
    row.className="stream-row";
    row.innerHTML= `<div class="stream-row-left"><span class="qlabel ${qc}">${ql}</span><span class="stream-name">${lang}${fname}</span></div><div class="stream-row-right">${seeds?`<span class="stream-seeds">👤${seeds}</span>`:""}${size?`<span class="stream-size">💾${size}</span>`:""}<span class="stream-play-btn">▶</span></div>`;
    row._url=s.url||"";
    row._title=fname;

    const playRow=()=>{
      document.querySelectorAll(".stream-row").forEach(x=>x.classList.remove("active"));
      row.classList.add("active");
      const title=(cur.title||cur.name||"")+(cur.mediaType==="movie"?"":` S${curS}E${curE}`);
      if(row._url) playWithPlyr(row._url, title);
      else loadSource(srcIdx);
    };
    row.onclick=playRow;
    wrap.appendChild(row);
    if(autoPlay && !autoPlayed){ autoPlayed=true; setTimeout(()=>row.click(), 100); }
  });
}

async function loadDirectStreams(autoPlay=false){
  if(!cur||!cur.imdb_id){ $("stream-loading").textContent="⚠️ No IMDb ID — streams unavailable"; return; }
  const isTv=cur.mediaType==="tv"||cur.mediaType==="series";
  const snapS=curS,snapE=curE;
  const cacheKey=`${cur.imdb_id}|${snapS}|${snapE}`;
  if(cacheKey===_cacheKey&&_cachedStreams.length){ buildStreamPicker(_cachedStreams,autoPlay); return; }
  $("stream-picker").style.display="block";
  $("stream-loading").style.display="block";
  $("stream-loading").textContent="🔄 Searching streams…";
  $("streambns").innerHTML="";
  const pulse=setInterval(()=>{
    const dots=($("stream-loading").textContent.match(/\./g)||[]).length;
    $("stream-loading").textContent="🔄 Searching streams"+".".repeat((dots+1)%4);
  },800);
  try{
    const streams=await fetchStreams(cur.imdb_id,isTv,snapS,snapE);
    clearInterval(pulse);
    if(snapS!==curS||snapE!==curE) return;
    _cachedStreams=streams; _cacheKey=cacheKey;
    if(!streams.length) $("stream-loading").textContent="⚠️ No streams found — use a Source button above";
    else buildStreamPicker(streams, autoPlay);
  }catch(err){
    clearInterval(pulse);
    $("stream-loading").textContent="⚠️ Stream fetch failed — try again";
  }
}

async function loadSeasons(tvId){

  try{
    const d=await tmdb(`/tv/${tvId}`);
    const seasons=(d.seasons||[]).filter(s=>s.season_number>0);
    seasons.forEach(s=>{
      const b=document.createElement("button");
      b.className="cbtn"+(s.season_number===curS?" on":"");

        document.querySelectorAll("#sbns .cbtn").forEach(x=>x.classList.remove("on"));
        b.classList.add("on"); curS=s.season_number; curE=1;
        updateMmeta();
        await loadEps(tvId,curS);
        tryAdFreeStream();

}

async function loadEps(tvId,s){
  const wrap=$("ebns"); wrap.innerHTML="";
  try{
    const d=await tmdb(`/tv/${tvId}/season/${s}`);
    (d.episodes||[]).forEach(ep=>{
      const b=document.createElement("button");
      b.className="epbtn"+(ep.episode_number===curE?" on":"");
      b.textContent=ep.episode_number; b.title=ep.name;
      b.onclick=()=>{
        document.querySelectorAll(".epbtn").forEach(x=>x.classList.remove("on"));
        b.classList.add("on"); curE=ep.episode_number;
        updateMmeta();
        tryAdFreeStream();
        loadDirectStreams(false);
      };
      wrap.appendChild(b);
    });
  }catch(e){ console.error("loadEps:",e); }
}

// ── MODAL ─────────────────────────────────────────────────────────
function openModal(item,type){
  console.log('🎬 openModal', item.title||item.name);
  try {
    cur={...item,mediaType:type};
    cur._year=(item.release_date||item.first_air_date||"").slice(0,4);
    cur._rating=item.vote_average?.toFixed(1)||"—";
    curS=1; curE=1; srcIdx=0;
    _cachedStreams=[]; _cacheKey="";
    stopVideo();
    const isTv=type==="tv"||type==="series";
    $("mtitle").textContent=item.title||item.name;
    $("mdesc").textContent=item.overview||"";
    $("mbg").src=back(item.backdrop_path);
    updateMmeta();
    clearPlayer();
    $("stream-name-bar").classList.remove("on");
    $("streambns").innerHTML="";
    $("stream-loading").style.display="block";
    $("stream-loading").textContent="🔄 Loading streams…";
    $("stream-picker").style.display="block";
    $("tv-ctrl").style.display=isTv?"block":"none";
    if(isTv){ $("sbns").innerHTML=""; $("ebns").innerHTML=""; }
    buildSources();
    $("modal").classList.add("on");
    document.body.style.overflow="hidden";
    (async()=>{
      if(!cur.imdb_id){
        try{
          const ext=await tmdb(`/${isTv?"tv":"movie"}/${item.id}/external_ids`);
          cur.imdb_id=ext.imdb_id||null;
        }catch(e){}
      }
      if(isTv) await loadSeasons(item.id);
      tryAdFreeStream();
      loadDirectStreams(false);
    })();
  } catch(e){ console.error('🔥 openModal error:', e); toast('⚠️ Error opening movie'); }
}

$("mclose").onclick=closeModal;
$("modal").onclick=e=>{ if(e.target===$("modal")) closeModal(); };
function closeModal(){
  $("modal").classList.remove("on");
  const pf=document.getElementById("pframe"); if(pf) pf.src="about:blank";
  stopVideo(); document.body.style.overflow=""; $("stream-name-bar").classList.remove("on");
}

// ── CARDS ─────────────────────────────────────────────────────────
function makeCard(item,type){
  try {
    const title=item.title||item.name||"Unknown";
    const year=(item.release_date||item.first_air_date||"").slice(0,4);
    const rating=item.vote_average?.toFixed(1)||"—";
    const d=document.createElement("div");
    d.className="card";
    d.innerHTML= `<img class="cposter" src="${poster(item.poster_path)}" alt="${title}" loading="lazy"><div class="cov"><div class="pbc">▶</div></div><div class="cinfo"><div class="ctitle">${title}</div><div class="cmeta"><span>${year}</span><span class="crating">⭐${rating}</span></div></div>`;
    d.onclick=()=>openModal(item,type);
    return d;
  } catch(e){ console.error('makeCard error', e); return document.createElement('div'); }
}

function skels(el,n=8){ el.innerHTML=""; for(let i=0;i<n;i++){ const d=document.createElement("div"); d.className="sk"; el.appendChild(d); } }

function setHero(item,type){
  $("hero-bg").style.backgroundImage=`url(${back(item.backdrop_path)})`;
  $("htitle").textContent=item.title||item.name;
  $("hdesc").textContent=item.overview||"";
  $("hyear").textContent=(item.release_date||item.first_air_date||"").slice(0,4);
  $("hrating").textContent=`⭐ ${item.vote_average?.toFixed(1)||"—"}`;
  $("hplay").onclick=()=>openModal(item,type);
  $("hinfo").onclick=()=>openModal(item,type);
}

async function loadSec(gid,path,params,type,hero=false){
  const g=$(gid); skels(g);
  try{
    const d=await tmdb(path,params);
    const items=d.results||[];
    g.innerHTML="";
    if(hero&&items.length) setHero(items[0],items[0].media_type||type);
    items.slice(0,12).forEach(it=> g.appendChild(makeCard(it,it.media_type||type)) );
  }catch(e){ g.innerHTML=`<div style="color:var(--muted);padding:20px">⚠️ Failed to load</div>`; }
}

// ── SEARCH ────────────────────────────────────────────────────────
const searchInput=$("sq");
searchInput.addEventListener("input",e=>{
  const q=e.target.value.trim();
  $("search-clear").style.display=q?"block":"none";
  clearTimeout(searchTimer);
  if(!q){ hideSearch(); return; }
  searchTimer=setTimeout(()=>showSearch(q),350);
});
searchInput.addEventListener("keydown",e=>{ if(e.key==="Enter") e.target.blur(); });
searchInput.addEventListener("focus",()=>{ if(searchInput.value.trim()) showSearch(searchInput.value.trim()); });

function clearSearch(){ searchInput.value=""; $("search-clear").style.display="none"; hideSearch(); }

function showSearch(q){
  $("main").style.display="none"; $("hero").style.display="none"; $("spage").classList.add("on");
  $("stitle").textContent=`"${q}"`;
  const g=$("sgrid"); skels(g,6);
  tmdb("/search/multi",{ query: q }).then(d=>{
    const items=(d.results||[]).filter(i=>i.media_type!=="person");
    g.innerHTML="";
    if(!items.length){ g.innerHTML=`<div style="color:var(--muted);padding:20px">No results for "${q}"</div>`; return; }
    items.slice(0,20).forEach(it=> g.appendChild(makeCard(it,it.media_type||"movie")) );
  }).catch(()=>{ g.innerHTML=`<div style="color:var(--muted);padding:20px">⚠️ Search failed</div>`; });
}

function hideSearch(){ $("main").style.display="block"; $("hero").style.display="flex"; $("spage").classList.remove("on"); }

// ── TABS ──────────────────────────────────────────────────────────
document.querySelectorAll(".tab").forEach(tab=>{
  tab.onclick=async()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
    tab.classList.add("on"); clearSearch();
    const c=tab.dataset.c;
    const secs=document.querySelectorAll("#main .sec");
    secs.forEach(s=>s.style.display="none");
    const show=id=> document.querySelector(`#${id}`)?.closest(".sec")?.style.setProperty("display","block");
    if(c==="home"){ secs.forEach(s=>s.style.display="block"); $("hero").style.display="flex"; }
    else if(c==="movies"){ $("hero").style.display="flex"; show("g0"); $("t0").textContent="🎬 Popular Movies"; skels($("g0")); loadSec("g0","/discover/movie",{sort_by:"popularity.desc"},"movie",true); }
    else if(c==="hindi"){ $("hero").style.display="none"; show("g1"); }
    else if(c==="tv"){ $("hero").style.display="flex"; show("g0"); $("t0").textContent="📺 Popular TV Shows"; skels($("g0")); loadSec("g0","/discover/tv",{sort_by:"popularity.desc"},"tv",true); }
    else if(c==="anime"){ $("hero").style.display="none"; show("g2"); }
    else if(c==="korean"){ $("hero").style.display="none"; show("g3"); }
  };
});

// ── PWA ───────────────────────────────────────────────────────────
if("serviceWorker" in navigator){
  const swCode=`const CACHE="cv-v3";const SHELL=["/"];self.addEventListener("install",e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(SHELL)).catch(()=>{})));self.addEventListener("fetch",e=>{if(["tmdb","opensubtitles","torrentio","vercel.app","workers.dev","apibay"].some(s=>e.request.url.includes(s)))return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});`;
  const blob=new Blob([swCode],{type:"application/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

// ── INIT ──────────────────────────────────────────────────────────
async function init(){
  console.log('⚙️ init started');
  try{
    await tmdb("/configuration");
    console.log('✅ TMDB connection OK');
  }catch(e){
    console.error('🔥 TMDB connection failed', e);
    toast("⚠️ TMDB connection failed");
    return;
  }
  await loadSec("g0","/trending/all/week",{},"movie",true);
  loadSec("g1","/discover/movie",{with_original_language:"hi",sort_by:"popularity.desc"},"movie");
  loadSec("g2","/discover/tv",{with_genres:"16",with_original_language:"ja",sort_by:"popularity.desc"},"tv");
  loadSec("g3","/discover/movie",{with_original_language:"ko",sort_by:"popularity.desc"},"movie");
  console.log('✅ init finished');
}
init();
</script>
