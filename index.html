<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CineVault">
<meta name="description" content="Free movies & TV streaming">
<link rel="manifest" href="manifest.json">
<title>CineVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d14;
  --s1: #13131e;
  --s2: #1a1a28;
  --s3: #222235;
  --border: rgba(255,255,255,0.07);
  --accent: #e8173a;
  --accent-dim: rgba(232,23,58,0.15);
  --gold: #fbbf24;
  --green: #10b981;
  --text: #f2f2f8;
  --muted: #6b6b8a;
  --r: 10px;
  --nav-h: 58px;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f0f0f7;
    --s1: #ffffff;
    --s2: #f8f8ff;
    --s3: #ededfa;
    --border: rgba(0,0,0,0.08);
    --text: #0d0d14;
    --muted: #8080a0;
  }
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
img{display:block}
button{cursor:pointer;font-family:'DM Sans',sans-serif}
a{text-decoration:none;color:inherit}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}

/* ── NAV ─────────────────────────────────── */
#nav {
  position:fixed;top:0;left:0;right:0;z-index:90;
  height:var(--nav-h);
  display:flex;align-items:center;gap:10px;
  padding:0 14px;
  background:rgba(13,13,20,0.9);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
@media(prefers-color-scheme:light){
  #nav{background:rgba(240,240,247,0.92)}
}
.logo{
  font-family:'Syne',sans-serif;font-size:20px;font-weight:800;
  letter-spacing:2px;color:var(--accent);
  text-shadow:0 0 24px rgba(232,23,58,0.5);
  flex-shrink:0;
}
/* SEARCH */
#search-box{
  flex:1;position:relative;max-width:340px;
}
#search-box input{
  width:100%;background:var(--s2);
  border:1px solid var(--border);color:var(--text);
  padding:8px 12px 8px 36px;border-radius:8px;
  font-size:14px;font-family:'DM Sans',sans-serif;
  outline:none;transition:border-color .2s;
  -webkit-appearance:none;
}
#search-box input:focus{border-color:var(--accent)}
#search-box input::placeholder{color:var(--muted)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
#search-clear{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--muted);font-size:16px;
  display:none;padding:2px 4px;
}
/* TABS */
#tabs{
  display:flex;gap:2px;flex-shrink:0;
  overflow-x:auto;scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
#tabs::-webkit-scrollbar{display:none}
.tab{
  padding:5px 11px;border-radius:7px;font-size:12px;font-weight:600;
  border:none;background:transparent;color:var(--muted);
  transition:all .2s;white-space:nowrap;
}
.tab.on,.tab:active{background:var(--accent);color:#fff}

/* ── HERO ────────────────────────────────── */
#hero{
  height:75vw;max-height:520px;min-height:300px;
  position:relative;display:flex;align-items:flex-end;
  padding:20px 16px;margin-top:var(--nav-h);overflow:hidden;
}
#hero-bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  transition:background-image .6s ease;
}
#hero-bg::after{
  content:'';position:absolute;inset:0;
  background:
    linear-gradient(to top,var(--bg) 0%,rgba(13,13,20,.6) 45%,transparent 100%),
    linear-gradient(to right,rgba(13,13,20,.8) 0%,transparent 60%);
}
@media(prefers-color-scheme:light){
  #hero-bg::after{
    background:
      linear-gradient(to top,var(--bg) 0%,rgba(240,240,247,.6) 45%,transparent 100%),
      linear-gradient(to right,rgba(240,240,247,.8) 0%,transparent 60%);
  }
}
.hc{position:relative;z-index:2;max-width:420px}
.hbadge{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--accent);color:#fff;
  padding:2px 9px;border-radius:4px;
  font-size:10px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;margin-bottom:8px;
}
#htitle{
  font-family:'Syne',sans-serif;font-size:clamp(22px,5vw,46px);
  font-weight:800;line-height:1.05;margin-bottom:6px;
}
#hdesc{
  font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:12px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.hmeta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);margin-bottom:12px}
.hrating{color:var(--gold);font-weight:700}
.hbtns{display:flex;gap:8px}
.btn-w{
  display:flex;align-items:center;gap:5px;
  background:var(--accent);color:#fff;
  border:none;padding:9px 18px;border-radius:8px;
  font-size:13px;font-weight:600;
  transition:all .15s;
}
.btn-w:active{transform:scale(.96)}
.btn-i{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.1);color:var(--text);
  border:1px solid var(--border);padding:9px 14px;border-radius:8px;
  font-size:13px;font-weight:500;
  backdrop-filter:blur(10px);
  transition:all .15s;
}
.btn-i:active{transform:scale(.96)}

/* ── SECTIONS ────────────────────────────── */
.sec{padding:16px 14px 4px}
.sec-title{
  font-family:'Syne',sans-serif;font-size:16px;font-weight:800;
  letter-spacing:.5px;margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent)}

/* ── GRID ────────────────────────────────── */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
  gap:8px;
}
@media(min-width:480px){.grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}}
@media(min-width:768px){.grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}}

/* ── CARD ────────────────────────────────── */
.card{
  border-radius:var(--r);overflow:hidden;
  cursor:pointer;background:var(--s2);
  border:1px solid var(--border);
  transition:transform .2s,box-shadow .2s;
  position:relative;
}
@media(hover:hover){
  .card:hover{transform:translateY(-3px) scale(1.02);border-color:var(--accent);box-shadow:0 6px 20px rgba(232,23,58,.2);z-index:2}
  .card:hover .cov{opacity:1}
}
.card:active{transform:scale(.97)}
.cposter{width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--s3)}
.cinfo{padding:6px 8px 8px}
.ctitle{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.cmeta{display:flex;justify-content:space-between;font-size:10px;color:var(--muted)}
.crating{color:var(--gold);font-weight:700}
.cov{
  position:absolute;inset:0;background:rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;border-radius:var(--r);
}
.pbc{width:40px;height:40px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}

/* ── SKELETON ────────────────────────────── */
.sk{
  border-radius:var(--r);aspect-ratio:2/3;
  background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);
  background-size:200% 100%;
  animation:sh 1.4s infinite;
}
@keyframes sh{to{background-position:-200% 0}}

/* ── MODAL ───────────────────────────────── */
#modal{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.85);
  display:none;align-items:flex-start;justify-content:center;
  padding:8px 8px 40px;overflow-y:auto;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  -webkit-overflow-scrolling:touch;
}
#modal.on{display:flex}
.mbox{
  background:var(--s1);border-radius:16px;
  width:100%;max-width:820px;margin:auto;
  border:1px solid var(--border);
  overflow:visible;position:relative;
}
.mclose{
  position:absolute;top:8px;right:8px;z-index:10;
  width:32px;height:32px;border-radius:50%;
  background:rgba(0,0,0,.7);border:1px solid var(--border);
  color:#fff;font-size:15px;
  display:flex;align-items:center;justify-content:center;
}
.mclose:active{transform:scale(.9)}
.mback{width:100%;aspect-ratio:16/9;background:#000;position:relative;overflow:hidden}
.mback img{width:100%;height:100%;object-fit:cover;opacity:.45}
.mback::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,var(--s1),transparent 55%);
}
.mbody{padding:14px 16px 40px;overflow-x:hidden}
.mtitle{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:5px}
.mmeta{display:flex;flex-wrap:wrap;gap:7px;font-size:11px;color:var(--muted);margin-bottom:8px;align-items:center}
.mrating{color:var(--gold);font-weight:700}
.mdesc{font-size:12px;line-height:1.7;color:var(--muted);margin-bottom:14px}

/* CTRL */
.crow{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;align-items:center}
.clabel{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-right:2px;white-space:nowrap}
.cbtns{display:flex;gap:4px;flex-wrap:wrap}
.cbtn{
  padding:5px 11px;border-radius:6px;font-size:11px;font-weight:600;
  border:1px solid var(--border);background:var(--s2);color:var(--text);
  transition:all .15s;white-space:nowrap;
}
.cbtn:active{transform:scale(.94)}
.cbtn.on,.cbtn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.cbtn.on-g{background:var(--green);border-color:var(--green);color:#fff}

/* PLAYER */
.pwrap{
  width:100%;aspect-ratio:16/9;border-radius:10px;
  overflow:hidden;background:#000;
  border:1px solid var(--border);position:relative;
}
.pwrap iframe{width:100%;height:100%;border:none;display:block}
.pph{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;color:var(--muted);font-size:13px;
  background:#000;
}
.pph.hidden{display:none}
.pph-icon{font-size:40px}

/* ── NOW PLAYING BOX ──────────────────────────── */
#stream-name-bar{
  display:none;
  margin-top:10px;
  background:var(--s1);
  border:2px solid var(--accent);
  border-radius:12px;
  padding:12px 16px;
  box-shadow:0 4px 20px rgba(232,23,58,0.15);
}
#stream-name-bar.on{ display:block; }
#stream-name-bar .snb-label{
  font-size:10px;font-weight:800;letter-spacing:1.2px;
  text-transform:uppercase;color:var(--accent);
  margin-bottom:6px;display:flex;align-items:center;gap:5px;
}
#stream-name-bar .snb-title{
  font-size:12px;font-weight:600;color:var(--text);
  word-break:break-all;line-height:1.5;margin-bottom:4px;
}
#stream-name-bar .snb-source{
  font-size:11px;color:var(--muted);margin-top:2px;
}
.ploader{
  display:none;position:absolute;inset:0;
  background:rgba(0,0,0,.6);
  align-items:center;justify-content:center;
}
.ploader.on{display:flex}
.spin{
  width:36px;height:36px;border:3px solid rgba(255,255,255,.15);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* EPISODE GRID */
.epwrap{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;max-height:120px;overflow-y:auto}
.epbtn{
  width:34px;height:34px;border-radius:6px;font-size:11px;font-weight:700;
  border:1px solid var(--border);background:var(--s2);color:var(--text);
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.epbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.epbtn:active{transform:scale(.9)}

/* SUB */
.subbar{display:none;align-items:center;gap:7px;margin-top:10px;flex-wrap:wrap}
.subbar.on{display:flex}
.subsel{
  flex:1;min-width:180px;background:var(--s2);
  border:1px solid var(--border);color:var(--text);
  padding:7px 9px;border-radius:7px;font-size:12px;
  font-family:'DM Sans',sans-serif;outline:none;
  -webkit-appearance:none;
}
.subbtn{
  padding:7px 13px;border-radius:7px;
  background:var(--green);color:#fff;
  border:none;font-size:12px;font-weight:600;
}

/* SEARCH PAGE */
#spage{display:none;padding:14px}
#spage.on{display:block}
.spage-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;margin-bottom:12px}
.sempty{text-align:center;padding:40px 20px;color:var(--muted)}
.sempty-icon{font-size:36px;margin-bottom:8px}

/* TOAST */
#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);
  background:var(--s3);color:var(--text);
  padding:9px 18px;border-radius:20px;font-size:13px;font-weight:500;
  border:1px solid var(--border);z-index:999;
  transition:transform .3s ease;white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
}
#toast.on{transform:translateX(-50%) translateY(0)}

footer{
  text-align:center;padding:24px;
  color:var(--muted);font-size:10px;
  border-top:1px solid var(--border);
  margin-top:12px;
}

/* SAFE AREA */
@supports(padding-bottom:env(safe-area-inset-bottom)){
  footer{padding-bottom:calc(24px + env(safe-area-inset-bottom))}
}

/* ── STREAM LIST ─────────────────────────────── */
.stream-row {
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;margin-bottom:5px;
  background:var(--s2);border:2px solid var(--border);
  border-radius:10px;cursor:pointer;
  transition:border-color .15s,background .15s,transform .1s;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.stream-row:active { transform:scale(.98); }
.stream-row.active {
  border-color:var(--accent);
  background:var(--accent-dim);
  box-shadow:0 0 0 1px var(--accent);
}
.stream-row-left { display:flex;align-items:center;gap:8px;min-width:0;flex:1; }
.stream-row-right { display:flex;align-items:center;gap:5px;flex-shrink:0; }
.qlabel {
  font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;
  flex-shrink:0;text-transform:uppercase;letter-spacing:.5px;
  white-space:nowrap;
}
.sq-4k   { background:#a855f7;color:#fff; }
.sq-1080 { background:var(--accent);color:#fff; }
.sq-720  { background:#3b82f6;color:#fff; }
.sq-480,.sq-sd { background:var(--s3);color:var(--muted); }
.stream-name {
  font-size:11px;font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  color:var(--text);flex:1;min-width:0;
}
.stream-seeds { font-size:10px;color:var(--green);font-weight:700;flex-shrink:0; }
.stream-size  { font-size:10px;color:var(--muted);flex-shrink:0; }
.stream-play-btn {
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:var(--s3);color:var(--text);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;transition:all .15s;pointer-events:none;
}
.stream-row.active .stream-play-btn {
  background:var(--accent);border-color:var(--accent);color:#fff;
}
</style>
</head>
<body>

<!-- NAV -->
<nav id="nav">
  <div class="logo">CV</div>
  <div id="search-box">
    <span class="si">🔍</span>
    <input type="search" id="sq" placeholder="Search…" autocomplete="off" enterkeyhint="search">
    <button id="search-clear" onclick="clearSearch()">✕</button>
  </div>
  <div id="tabs">
    <button class="tab on" data-c="home">🏠</button>
    <button class="tab" data-c="movies">🎬</button>
    <button class="tab" data-c="hindi">🇮🇳</button>
    <button class="tab" data-c="tv">📺</button>
    <button class="tab" data-c="anime">🎌</button>
    <button class="tab" data-c="korean">🇰🇷</button>
  </div>
</nav>

<!-- HERO -->
<div id="hero">
  <div id="hero-bg"></div>
  <div class="hc">
    <div class="hbadge">⭐ Featured</div>
    <div id="htitle">Loading…</div>
    <div id="hdesc"></div>
    <div class="hmeta">
      <span id="hyear"></span><span>•</span>
      <span class="hrating" id="hrating"></span>
    </div>
    <div class="hbtns">
      <button class="btn-w" id="hplay">▶ Watch</button>
      <button class="btn-i" id="hinfo">ℹ Info</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div class="sec"><div class="sec-title" id="t0">🔥 Trending</div><div class="grid" id="g0"></div></div>
  <div class="sec"><div class="sec-title">🇮🇳 Bollywood</div><div class="grid" id="g1"></div></div>
  <div class="sec"><div class="sec-title">🎌 Anime</div><div class="grid" id="g2"></div></div>
  <div class="sec"><div class="sec-title">🇰🇷 Korean</div><div class="grid" id="g3"></div></div>
</div>

<!-- SEARCH PAGE -->
<div id="spage">
  <div class="spage-title" id="stitle">Results</div>
  <div class="grid" id="sgrid"></div>
</div>

<!-- MODAL -->
<div id="modal">
  <div class="mbox">
    <button class="mclose" id="mclose">✕</button>
    <div class="mback"><img id="mbg" src="" alt=""><div></div></div>
    <div class="mbody">
      <div class="mtitle" id="mtitle"></div>
      <div class="mmeta" id="mmeta"></div>
      <div class="mdesc" id="mdesc"></div>

      <div id="tv-ctrl" style="display:none">
        <div class="crow"><span class="clabel">Season</span><div class="cbtns" id="sbns"></div></div>
        <div class="clabel" style="margin-bottom:6px">Episode</div>
        <div class="epwrap" id="ebns"></div>
      </div>

      <div class="crow" id="src-row">
        <span class="clabel">Source</span>
        <div class="cbtns" id="srcbns"></div>
      </div>

      <div class="crow" id="srv-row" style="display:none">
        <span class="clabel">Server</span>
        <div class="cbtns" id="srvbns"></div>
      </div>

      <div class="pwrap" id="pwrap">
        <div class="pph" id="pph"><div class="pph-icon">🎬</div><div>Loading best source…</div></div>
        <div class="ploader" id="ploader"><div class="spin"></div></div>
        <iframe id="pframe" allowfullscreen allow="autoplay; fullscreen; picture-in-picture; encrypted-media; clipboard-write" referrerpolicy="no-referrer"></iframe>
      </div>
      <div id="stream-name-bar">
        <div class="snb-label">▶ Now Playing</div>
        <div class="snb-title" id="stream-name-text"></div>
        <div class="snb-source" id="stream-name-source"></div>
      </div>

      <!-- Quality/File selector -->
      <div class="crow" id="file-row" style="display:none;margin-top:10px">
        <span class="clabel">🎬 File</span>
        <div class="cbtns" id="filebns"></div>
      </div>

      <div id="stream-picker" style="display:block;margin-top:14px">
        <div class="clabel" style="margin-bottom:8px">📊 STREAM QUALITY INFO</div>
        <div id="stream-loading" style="font-size:12px;color:var(--muted);padding:8px 0;display:none">🔄 Loading streams…</div>
        <div id="streambns"></div>
      </div>

      <div class="subbar" id="subbar">
        <select class="subsel" id="subsel"><option value="">🔤 No subtitle</option></select>
        <button class="subbtn" onclick="applySub()">Apply</button>
      </div>

    </div>
  </div>
</div>

<div id="toast"></div>
<footer><strong>CineVault</strong> · Free streaming · For entertainment only</footer>

<script>
const $ = id => document.getElementById(id);

// ── CONFIG ──────────────────────────────────────────────────────
const TMDB_KEY = "4ef0d7355d9ffb5151e987764708ce96";
const IMG = "https://image.tmdb.org/t/p/";

const SOURCES = [
  { name:"VidLink",    useImdb:false, movie:id=>`https://vidlink.pro/movie/${id}?autoplay=true&primaryColor=e8173a`,  tv:(id,s,e)=>`https://vidlink.pro/tv/${id}/${s}/${e}?autoplay=true&primaryColor=e8173a` },
  { name:"MultiEmbed", useImdb:false, movie:id=>`https://multiembed.mov/?video_id=${id}&tmdb=1`,                     tv:(id,s,e)=>`https://multiembed.mov/?video_id=${id}&tmdb=1&s=${s}&e=${e}` },
  { name:"2Embed",     useImdb:true,  movie:id=>`https://www.2embed.cc/embed/${id}`,                                 tv:(id,s,e)=>`https://www.2embed.cc/embedtv/${id}&s=${s}&e=${e}` },
  { name:"VidSrc",     useImdb:true,  movie:id=>`https://vidsrc.to/embed/movie/${id}`,                               tv:(id,s,e)=>`https://vidsrc.to/embed/tv/${id}/${s}/${e}` },
  { name:"Smashy",     useImdb:false, movie:id=>`https://player.smashy.stream/movie/${id}`,                         tv:(id,s,e)=>`https://player.smashy.stream/tv/${id}?s=${s}&e=${e}` },
  { name:"EmbedSu",    useImdb:true,  movie:id=>`https://embed.su/embed/movie/${id}`,                               tv:(id,s,e)=>`https://embed.su/embed/tv/${id}/${s}/${e}` },
  { name:"AutoEmbed",  useImdb:true,  movie:id=>`https://autoembed.cc/movie/imdb/${id}`,                            tv:(id,s,e)=>`https://autoembed.cc/tv/imdb/${id}-${s}-${e}` },
  { name:"NontonGo",   useImdb:true,  movie:id=>`https://www.nontongo.win/embed/movie?imdb=${id}`,                  tv:(id,s,e)=>`https://www.nontongo.win/embed/tv?imdb=${id}&season=${s}&episode=${e}` },
];

// ── STATE ───────────────────────────────────────────────────────
let cur = null, curS = 1, curE = 1, srcIdx = 0, searchTimer = null, _cachedStreams = [], _cacheKey = "";

// ── UTILS ───────────────────────────────────────────────────────
const poster = p => p ? `${IMG}w300${p}` : `https://placehold.co/300x450/1a1a28/444?text=No+Poster`;
const back   = p => p ? `${IMG}w1280${p}` : "";

function toast(msg, ms=2200) {
  const t = $("toast"); t.textContent = msg; t.classList.add("on");
  setTimeout(() => t.classList.remove("on"), ms);
}

// ── TMDB ────────────────────────────────────────────────────────
async function tmdb(path, params={}) {
  const q = new URLSearchParams({ api_key: TMDB_KEY, ...params });
  const r = await fetch(`https://api.themoviedb.org/3${path}?${q}`);
  if (!r.ok) throw new Error("TMDB " + r.status);
  return r.json();
}

// ── QUALITY BADGE ────────────────────────────────────────────────
function qClass(name) {
  if (/4k|2160/i.test(name))  return ["4K",   "sq-4k"];
  if (/1080/i.test(name))     return ["1080p", "sq-1080"];
  if (/720/i.test(name))      return ["720p",  "sq-720"];
  if (/480/i.test(name))      return ["480p",  "sq-480"];
  return ["SD", "sq-sd"];
}

// ── NOW PLAYING BOX ──────────────────────────────────────────────
function setNameBar(title, sub) {
  $("stream-name-text").textContent   = title || "";
  $("stream-name-source").textContent = sub   || "";
  $("stream-name-bar").classList.add("on");
}

// ── PLAYER ──────────────────────────────────────────────────────
function playUrl(url) {
  $("pph").classList.add("hidden");
  const f = $("pframe");
  // Force full reload
  f.removeAttribute("src");
  void f.offsetHeight;
  f.src = url;
}

// ── SOURCES ─────────────────────────────────────────────────────
function buildSources() {
  const wrap = $("srcbns");
  wrap.innerHTML = "";
  SOURCES.forEach((src, i) => {
    const b = document.createElement("button");
    b.className = "cbtn" + (i === srcIdx ? " on" : "");
    b.textContent = src.name;
    b.onclick = () => loadSource(i);
    wrap.appendChild(b);
  });
}

// ── TORRENTIO STREAM LIST ────────────────────────────────────────
async function fetchStreams(imdbId, type, s, e) {
  try {
    const path = type === "movie" ? `movie/${imdbId}` : `series/${imdbId}:${s}:${e}`;
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 8000); // 8s timeout
    const r = await fetch(`https://torrentio.strem.fun/stream/${path}.json`, { signal: controller.signal });
    clearTimeout(timer);
    const d = await r.json();
    return (d.streams || []).slice(0, 15);
  } catch { return []; }
}

function qClass(name) {
  if (/4k|2160/i.test(name))  return ["4K",   "sq-4k"];
  if (/1080/i.test(name))     return ["1080p", "sq-1080"];
  if (/720/i.test(name))      return ["720p",  "sq-720"];
  if (/480/i.test(name))      return ["480p",  "sq-480"];
  return ["SD", "sq-sd"];
}

// Rebuild stream rows using current srcIdx — called on load AND on source change
function buildStreamPicker(streams) {
  const wrap = $("streambns");
  wrap.innerHTML = "";
  $("stream-loading").style.display = "none";
  if (!streams.length) { $("stream-picker").style.display = "none"; return; }
  $("stream-picker").style.display = "block";

  const label = $("stream-picker").querySelector(".clabel");
  if (label) label.textContent = "📊 STREAMS — " + SOURCES[srcIdx].name.toUpperCase();

  streams.forEach((s) => {
    const lines = (s.title || s.name || "").split("\n");
    const fname = lines[0] || "Unknown";
    const meta  = lines.slice(1).join(" ");
    const seeds = (meta.match(/👤\s*(\d+)/) || [])[1] || "";
    const size  = (meta.match(/💾\s*([\d.]+ ?[KMGT]B)/) || [])[1] || "";
    const [ql, qc] = qClass(fname);
    let lang = "";
    if      (/hindi/i.test(fname+meta))    lang = "🇮🇳 ";
    else if (/korean/i.test(fname+meta))   lang = "🇰🇷 ";
    else if (/japanese/i.test(fname+meta)) lang = "🇯🇵 ";

    const row = document.createElement("div");
    row.className = "stream-row";
    row.innerHTML =
      `<div class="stream-row-left">` +
        `<span class="qlabel ${qc}">${ql}</span>` +
        `<span class="stream-name">${lang}${fname}</span>` +
      `</div>` +
      `<div class="stream-row-right">` +
        (seeds ? `<span class="stream-seeds">👤${seeds}</span>` : "") +
        (size  ? `<span class="stream-size">💾${size}</span>`  : "") +
        `<span class="stream-play-btn">▶</span>` +
      `</div>`;

    // Store stream data on the row element for re-use when source changes
    row._fname = fname;
    row._ql    = ql;
    row._size  = size;
    row._seeds = seeds;

    row.onclick = () => playStream(row);
    wrap.appendChild(row);
  });
}

// Tap a stream row → just highlight it (quality info only, source plays)
function playStream(row) {
  document.querySelectorAll(".stream-row").forEach(x => x.classList.remove("active"));
  row.classList.add("active");
  toast("✓ Selected: " + row._ql + (row._seeds ? "  👤" + row._seeds : ""));
  // If a source already active, reload it so user sees something
  if (srcIdx >= 0 && document.querySelector("#srcbns .cbtn.on")) {
    loadSource(srcIdx);
  }
}

// Load streams from Torrentio — only fetches once per title/episode
async function loadDirectStreams() {
  if (!cur) return;

  // Show section immediately
  $("stream-picker").style.display = "block";
  $("stream-loading").style.display = "block";
  $("streambns").innerHTML = "";

  // If no imdb_id yet, wait up to 5s for it (fetched async in background)
  if (!cur.imdb_id) {
    let waited = 0;
    await new Promise(resolve => {
      const check = setInterval(() => {
        waited += 200;
        if (cur.imdb_id || waited >= 5000) { clearInterval(check); resolve(); }
      }, 200);
    });
  }
  if (!cur.imdb_id) {
    $("stream-loading").textContent = "⚠️ No IMDB ID — streams unavailable";
    return;
  }

  const snapS = curS, snapE = curE;
  const isTv  = cur.mediaType === "tv" || cur.mediaType === "series";
  const key   = cur.imdb_id + "|" + snapS + "|" + snapE;

  if (key === _cacheKey && _cachedStreams.length) {
    buildStreamPicker(_cachedStreams);
    return;
  }

  try {
    const streams = await fetchStreams(cur.imdb_id, isTv ? "series" : "movie", snapS, snapE);
    if (snapS === curS && snapE === curE) {
      _cachedStreams = streams;
      _cacheKey = key;
      if (!streams.length) {
        $("stream-loading").style.display = "block";
        $("stream-loading").textContent = "⚠️ No streams found";
      } else {
        buildStreamPicker(streams);
      }
    }
  } catch(err) {
    $("stream-loading").style.display = "block";
    $("stream-loading").textContent = "⚠️ Failed to load streams";
  }
}



function loadSource(i) {
  srcIdx = i;
  const src = SOURCES[i];
  if (!src || !cur) return;

  // Highlight button
  document.querySelectorAll("#srcbns .cbtn").forEach((b, j) => b.classList.toggle("on", j === i));

  // Update stream list label dynamically
  const lbl = $("stream-picker").querySelector(".clabel");
  if (lbl) lbl.textContent = "📊 STREAMS — " + src.name.toUpperCase();

  const isMovie = cur.mediaType === "movie";
  const id = src.useImdb ? (cur.imdb_id || cur.id) : cur.id;
  if (!id) { toast("⏳ Still loading ID…"); return; }

  const url = isMovie ? src.movie(id) : src.tv(id, curS, curE);
  playUrl(url);
  toast("▶ " + src.name);
}

// ── CARDS ───────────────────────────────────────────────────────
function makeCard(item, type) {
  const title  = item.title || item.name || "Unknown";
  const year   = (item.release_date || item.first_air_date || "").slice(0,4);
  const rating = item.vote_average?.toFixed(1) || "—";
  const d = document.createElement("div");
  d.className = "card";
  d.innerHTML = `
    <img class="cposter" src="${poster(item.poster_path)}" alt="${title}" loading="lazy">
    <div class="cov"><div class="pbc">▶</div></div>
    <div class="cinfo">
      <div class="ctitle">${title}</div>
      <div class="cmeta"><span>${year}</span><span class="crating">⭐${rating}</span></div>
    </div>`;
  d.onclick = () => openModal(item, type);
  return d;
}

function skels(el, n=8) {
  el.innerHTML = "";
  for (let i=0;i<n;i++) { const d=document.createElement("div"); d.className="sk"; el.appendChild(d); }
}

// ── HERO ────────────────────────────────────────────────────────
function setHero(item, type) {
  $("hero-bg").style.backgroundImage = `url(${back(item.backdrop_path)})`;
  $("htitle").textContent  = item.title || item.name;
  $("hdesc").textContent   = item.overview || "";
  $("hyear").textContent   = (item.release_date || item.first_air_date || "").slice(0,4);
  $("hrating").textContent = `⭐ ${item.vote_average?.toFixed(1)||"—"}`;
  $("hplay").onclick = () => openModal(item, type);
  $("hinfo").onclick = () => openModal(item, type);
}

// ── LOAD SECTION ────────────────────────────────────────────────
async function loadSec(gid, path, params, type, hero=false) {
  const g = $(gid); skels(g);
  try {
    const d = await tmdb(path, params);
    const items = d.results || [];
    g.innerHTML = "";
    if (hero && items.length) setHero(items[0], items[0].media_type || type);
    items.slice(0,12).forEach(it => g.appendChild(makeCard(it, it.media_type || type)));
  } catch { g.innerHTML = `<div class="sempty"><div class="sempty-icon">⚠️</div>Failed</div>`; }
}

// ── MODAL ───────────────────────────────────────────────────────
function openModal(item, type) {
  cur = { ...item, mediaType: type };
  curS = 1; curE = 1; srcIdx = 0;
  _cachedStreams = []; _cacheKey = "";

  const isTv = type === "tv" || type === "series";

  // Reset UI immediately
  $("mtitle").textContent = item.title || item.name;
  $("mdesc").textContent  = item.overview || "";
  $("mbg").src            = back(item.backdrop_path);
  $("subbar").classList.remove("on");
  $("file-row").style.display = "none";
  $("stream-name-bar").classList.remove("on");
  $("stream-picker").style.display = "block";
  $("stream-loading").style.display = "block";
  $("stream-loading").textContent = "🔄 Loading streams…";
  $("streambns").innerHTML = "";
  $("tv-ctrl").style.display = isTv ? "block" : "none";

  const year   = (item.release_date || item.first_air_date || "").slice(0,4);
  const rating = item.vote_average?.toFixed(1) || "—";
  $("mmeta").innerHTML = `<span>${year}</span><span>•</span><span class="mrating">⭐${rating}</span><span>•</span><span>${type==="movie"?"🎬 Movie":"📺 Series"}</span>`;

  buildSources();
  $("modal").classList.add("on");
  document.body.style.overflow = "hidden";

  // Reset player — wait for user to tap a source
  $("pframe").src = "";
  $("pph").classList.remove("hidden");
  $("pph").innerHTML = `<div class="pph-icon">⏳</div><div>Loading...</div>`;

  // Auto-play source 0 immediately with TMDB id
  loadSource(0);

  // Load everything async in background
  (async () => {
    // Fetch IMDB id
    if (!cur.imdb_id) {
      try {
        const ext = await tmdb(`/${isTv?"tv":"movie"}/${item.id}/external_ids`);
        cur.imdb_id = ext.imdb_id;
        // Reload if current source needs imdb
        if (SOURCES[srcIdx]?.useImdb) loadSource(srcIdx);
      } catch {}
    }
    // Load seasons for TV
    if (isTv) await loadSeasons(item.id);
    // Load streams and subs
    loadDirectStreams();
    loadSubs();
  })();
}

// ── SEASONS / EPISODES ──────────────────────────────────────────
async function loadSeasons(tvId) {
  try {
    const d = await tmdb(`/tv/${tvId}`);
    const seasons = (d.seasons||[]).filter(s => s.season_number > 0);
    const wrap = $("sbns"); wrap.innerHTML = "";
    seasons.forEach(s => {
      const b = document.createElement("button");
      b.className = "cbtn" + (s.season_number===1?" on":"");
      b.textContent = `S${s.season_number}`;
      b.onclick = async () => {
        document.querySelectorAll("#sbns .cbtn").forEach(x => x.classList.remove("on"));
        b.classList.add("on");
        curS = s.season_number; curE = 1;
        await loadEps(tvId, curS);
        loadSource(srcIdx);
        loadDirectStreams();
      };
      wrap.appendChild(b);
    });
    await loadEps(tvId, 1);
  } catch {}
}

async function loadEps(tvId, s) {
  try {
    const d = await tmdb(`/tv/${tvId}/season/${s}`);
    const wrap = $("ebns"); wrap.innerHTML = "";
    (d.episodes||[]).forEach(ep => {
      const b = document.createElement("button");
      b.className = "epbtn" + (ep.episode_number===1?" on":"");
      b.textContent = ep.episode_number;
      b.title = ep.name;
      b.onclick = () => {
        document.querySelectorAll(".epbtn").forEach(x => x.classList.remove("on"));
        b.classList.add("on");
        curE = ep.episode_number;
        loadSource(srcIdx);
        loadDirectStreams();
      };
      wrap.appendChild(b);
    });
  } catch {}
}

// ── SUBTITLES ───────────────────────────────────────────────────
async function loadSubs() {
  try {
    const imdb = cur?.imdb_id || "";
    if (!imdb) return;
    const id = imdb.replace("tt","");
    const r = await fetch(`https://rest.opensubtitles.org/search/imdbid-${id}/sublanguageid-all`, {
      headers: { "X-User-Agent": "TemporaryUserAgent" }
    });
    const data = await r.json();
    if (!Array.isArray(data)||!data.length) return;
    const sel = $("subsel");
    sel.innerHTML = `<option value="">🔤 No subtitle</option>`;
    const langs = {};
    data.forEach(s => {
      if (!langs[s.LanguageName]) langs[s.LanguageName] = [];
      langs[s.LanguageName].push(s);
    });
    Object.entries(langs).slice(0,12).forEach(([lang, subs]) => {
      subs.slice(0,3).forEach(s => {
        const opt = document.createElement("option");
        opt.value = s.SubDownloadLink||"";
        opt.textContent = `${lang} — ${(s.MovieReleaseName||s.SubFileName||"").slice(0,40)}`;
        sel.appendChild(opt);
      });
    });
    $("subbar").classList.add("on");
  } catch {}
}

function applySub() {
  const url = $("subsel").value;
  if (!url) return toast("No subtitle selected");
  window.open(url.replace(".gz",""), "_blank");
  toast("Subtitle file opened — use with VLC");
}

// ── CLOSE MODAL ─────────────────────────────────────────────────
$("mclose").onclick = closeModal;
$("modal").onclick = e => { if (e.target===$("modal")) closeModal(); };
function closeModal() {
  $("modal").classList.remove("on");
  $("pframe").src = "";
  $("pph").classList.remove("hidden");
  $("pph").innerHTML = `<div class="pph-icon">🎬</div><div>Select a source to play</div>`;
  $("stream-name-bar").classList.remove("on");
  $("stream-name-text").textContent   = "";
  $("stream-name-source").textContent = "";
  document.body.style.overflow = "";
}

// ── SEARCH ──────────────────────────────────────────────────────
const searchInput = $("sq");
searchInput.addEventListener("input", handleSearch);
searchInput.addEventListener("keydown", e => { if(e.key==="Enter") { e.target.blur(); handleSearch(e); } });
searchInput.addEventListener("focus",  () => { if(searchInput.value.trim()) showSearch(searchInput.value.trim()); });

function handleSearch(e) {
  const q = e.target.value.trim();
  $("search-clear").style.display = q ? "block" : "none";
  clearTimeout(searchTimer);
  if (!q) { hideSearch(); return; }
  searchTimer = setTimeout(() => doSearch(q), 350);
}

function clearSearch() {
  searchInput.value = "";
  $("search-clear").style.display = "none";
  hideSearch();
  searchInput.focus();
}

function showSearch(q) {
  $("main").style.display = "none";
  $("hero").style.display = "none";
  $("spage").classList.add("on");
  doSearch(q);
}

function hideSearch() {
  $("main").style.display = "block";
  $("hero").style.display = "flex";
  $("spage").classList.remove("on");
}

async function doSearch(q) {
  $("stitle").textContent = `"${q}"`;
  const g = $("sgrid"); skels(g, 6);
  try {
    const d = await tmdb("/search/multi", { query: q });
    const items = (d.results||[]).filter(i => i.media_type!=="person");
    g.innerHTML = "";
    if (!items.length) {
      g.innerHTML = `<div class="sempty"><div class="sempty-icon">🎬</div>No results for "${q}"</div>`;
      return;
    }
    $("spage").classList.add("on");
    $("main").style.display = "none";
    $("hero").style.display = "none";
    items.slice(0,20).forEach(it => g.appendChild(makeCard(it, it.media_type||"movie")));
  } catch {
    g.innerHTML = `<div class="sempty"><div class="sempty-icon">⚠️</div>Search failed</div>`;
  }
}

// ── TABS ────────────────────────────────────────────────────────
document.querySelectorAll(".tab").forEach(tab => {
  tab.onclick = async () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("on"));
    tab.classList.add("on");
    clearSearch();
    const c = tab.dataset.c;
    const secs = document.querySelectorAll("#main .sec");
    secs.forEach(s => s.style.display="none");
    const show = id => { document.querySelector(`#${id}`)?.closest(".sec")?.style?.setProperty("display","block"); };

    if (c==="home") {
      secs.forEach(s => s.style.display="block");
      $("hero").style.display="flex";
    } else if (c==="movies") {
      $("hero").style.display="flex";
      show("g0"); $("t0").textContent="🎬 Popular Movies";
      skels($("g0")); loadSec("g0","/discover/movie",{sort_by:"popularity.desc"},"movie",true);
    } else if (c==="hindi") {
      $("hero").style.display="none"; show("g1");
    } else if (c==="tv") {
      $("hero").style.display="flex";
      show("g0"); $("t0").textContent="📺 Popular TV Shows";
      skels($("g0")); loadSec("g0","/discover/tv",{sort_by:"popularity.desc"},"tv",true);
    } else if (c==="anime") {
      $("hero").style.display="none"; show("g2");
    } else if (c==="korean") {
      $("hero").style.display="none"; show("g3");
    }
  };
});

// ── PWA SERVICE WORKER ──────────────────────────────────────────
if ("serviceWorker" in navigator) {
  const swCode = `
const CACHE="cv-v2";
const SHELL=["/cinevault/","/cinevault/index.html"];
self.addEventListener("install",e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(SHELL)).catch(()=>{})));
self.addEventListener("fetch",e=>{
  if(e.request.url.includes("tmdb")||e.request.url.includes("opensubtitles")||e.request.url.includes("torrentio"))return;
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));
});`;
  const blob = new Blob([swCode], { type:"application/javascript" });
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

// ── INIT ────────────────────────────────────────────────────────
async function init() {
  await loadSec("g0","/trending/all/week",{},"movie",true);
  loadSec("g1","/discover/movie",{with_original_language:"hi",sort_by:"popularity.desc"},"movie");
  loadSec("g2","/discover/tv",{with_genres:"16",with_original_language:"ja",sort_by:"popularity.desc"},"tv");
  loadSec("g3","/discover/movie",{with_original_language:"ko",sort_by:"popularity.desc"},"movie");
}
init();
